name: Hankyung Consensus Daily

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional target date in YYYY-MM-DD. Leave empty to use latest available date.
        required: false
        type: string
  schedule:
    - cron: "0 9 * * 1-5"
    - cron: "30 14 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hankyung-consensus-pages
  cancel-in-progress: false

jobs:
  collect:
    outputs:
      target_date: ${{ steps.capture.outputs.target_date || steps.precheck.outputs.target_date }}
      report_count: ${{ steps.capture.outputs.report_count || steps.precheck.outputs.pending_count || '0' }}
      should_run: ${{ steps.precheck.outputs.should_run }}
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HANKYUNG_TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 openai openpyxl pandas PyMuPDF requests

      - name: Decide whether collector should run
        id: precheck
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 14 * * 1-5" ]; then
            python -c "from stocks import build_session, get_target_date, summarize_pending_reports; session = build_session(); target_date = get_target_date(session); summary = summarize_pending_reports(session, target_date); print(f\"should_run={'true' if summary['has_new_reports'] else 'false'}\"); print(f\"target_date={summary['target_date']}\"); print(f\"pending_count={summary['new_report_count']}\")" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip collector when nothing new was posted
        if: steps.precheck.outputs.should_run != 'true'
        run: echo "No new reports detected for the secondary scheduled run."

      - name: Validate secret
        if: steps.precheck.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is missing."
            exit 1
          fi

      - name: Run collector
        if: steps.precheck.outputs.should_run == 'true'
        run: python stocks.py

      - name: Capture run metadata
        id: capture
        if: success() && steps.precheck.outputs.should_run == 'true'
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          payload = json.loads(Path("reports_mobile/latest.json").read_text(encoding="utf-8"))
          print(f"target_date={payload.get('target_date', '')}")
          print(f"report_count={payload.get('count', '')}")
          PY

      - name: Persist archive to repository
        if: success() && steps.precheck.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports_mobile/
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Update mobile archive"
            git push
          fi

      - name: Upload reports bundle
        if: success() && steps.precheck.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hankyung-consensus-output
          retention-days: 14
          path: |
            reports_mobile/
            reports_json/
            reports_pdf/
            hankyung_consensus_summary_*.xlsx

      - name: Upload Pages artifact
        if: success() && steps.precheck.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports_mobile

  deploy:
    needs: collect
    if: needs.collect.outputs.should_run == 'true' && needs.collect.result == 'success'
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [collect, deploy]
    if: always() && needs.collect.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      TARGET_DATE: ${{ needs.collect.outputs.target_date }}
      REPORT_COUNT: ${{ needs.collect.outputs.report_count }}
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      COLLECT_RESULT: ${{ needs.collect.result }}
      DEPLOY_RESULT: ${{ needs.deploy.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Kakao notification
        shell: bash
        run: |
          if [ -z "${KAKAO_REST_API_KEY}" ] || [ -z "${KAKAO_CLIENT_SECRET}" ] || [ -z "${KAKAO_REFRESH_TOKEN}" ]; then
            echo "Kakao secrets are not configured. Skipping notification."
            exit 0
          fi

          if [ ! -f "scripts/send_kakao_notification.py" ]; then
            echo "scripts/send_kakao_notification.py is missing. Skipping notification."
            exit 0
          fi

          status_label="FAILED"
          note="collect_or_deploy_failed"
          if [ "${COLLECT_RESULT}" = "success" ] && [ "${DEPLOY_RESULT}" = "success" ]; then
            status_label="DONE"
            note="updated"
          elif [ "${COLLECT_RESULT}" = "success" ] && [ "${DEPLOY_RESULT}" != "success" ]; then
            note="deploy_failed"
          fi

          python scripts/send_kakao_notification.py \
            --status-label "${status_label}" \
            --target-date "${TARGET_DATE}" \
            --report-count "${REPORT_COUNT}" \
            --page-url "${PAGE_URL}" \
            --run-url "${RUN_URL}" \
            --note "${note}"
