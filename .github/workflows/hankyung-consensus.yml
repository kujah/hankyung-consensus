name: Hankyung Consensus Daily

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional target date in YYYY-MM-DD. Leave empty to use latest available date.
        required: false
        type: string
  schedule:
    - cron: "0 8 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hankyung-consensus-pages
  cancel-in-progress: false

jobs:
  collect:
    outputs:
      target_date: ${{ steps.capture.outputs.target_date }}
      report_count: ${{ steps.capture.outputs.report_count || '0' }}
      should_run: 'true'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      HANKYUNG_EMAIL_TO: kujah@poscointl.com
      HANKYUNG_TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 openai openpyxl pandas PyMuPDF requests

      - name: Validate secret
        shell: bash
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is missing."
            exit 1
          fi

      - name: Run collector
        run: python stocks.py

      - name: Capture run metadata
        id: capture
        if: success()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          payload = json.loads(Path("reports_mobile/latest.json").read_text(encoding="utf-8"))
          print(f"target_date={payload.get('target_date', '')}")
          print(f"report_count={payload.get('count', '')}")
          PY

      - name: Persist archive to repository
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports_mobile/
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Update mobile archive"
            git push
          fi

      - name: Send Gmail digest
        if: success()
        shell: bash
        env:
          HANKYUNG_PAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          if [ -z "${GMAIL_USERNAME}" ] || [ -z "${GMAIL_APP_PASSWORD}" ]; then
            echo "Gmail secrets are not configured. Skipping email."
            exit 0
          fi

          if [ ! -f "scripts/send_hankyung_email.py" ]; then
            echo "scripts/send_hankyung_email.py is missing. Skipping email."
            exit 0
          fi

          python scripts/send_hankyung_email.py --input reports_mobile/latest.json --recipient "${HANKYUNG_EMAIL_TO}"

      - name: Upload reports bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hankyung-consensus-output
          retention-days: 14
          path: |
            reports_mobile/
            reports_json/
            reports_pdf/
            hankyung_consensus_summary_*.xlsx

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports_mobile

  deploy:
    needs: collect
    if: needs.collect.result == 'success'
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
