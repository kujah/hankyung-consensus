 "json_path": "../reports_json/산업/650254.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650254"}, {"report_idx": "650248", "category": "산업", "published_at": "2026-06-25", "title": "[IBKS Spot Comment] : [SK하이닉스] ADR(American Depositary Recip...", "author": "김운호", "source": "IBK투자증권", "company_name": null, "stock_code": null, "industry_name": "IT/반도체", "market_topic": "SK하이닉스 ADR 발행 위한 3자 배정 유상증자 및 나스닥시장 상장 계획", "investment_opinion": null, "target_price": null, "summary": "SK하이닉스는 미국 나스닥시장 직접 상장을 위한 대규모 유상증자를 통해 시설 투자 자금을 확보하면서 국내 반도체 업계의 밸류에이션 한계를 극복하고자 한다. ADR 발행을 통한 미국시장 진출은 마이크론과 경쟁 구도에서 국내 주가의 가치 재평가를 유도하며, 국내외 투자자의 관심과 밸류에이션 상승 모멘텀을 기대하게 한다.", "key_points": ["SK하이닉스가 1,779만주(약 45.4조원) 규모의 3자 배정 유상증자를 결정하여 미국 나스닥시장에 ADR 발행 및 직접 상장 예정임.", "유상증자를 통해 확보한 자금은 용인 1기 시설 투자(31조원), 청주 P&T 시설 투자(19조원), EUV 장비 확보(12조원)에 사용될 계획임.", "이번 ADR 상장 및 유상증자는 국내 시장에서 낮게 평가되던 밸류에이션을 미국 시장에서 극복하고, 필라델피아 반도체 지수 편입 기대감과 마이크론과의 직접 비교를 가능하게 하는 전략임.", "국내 주식 시장에도 나스닥 ADR 수준의 밸류에이션 상승 효과가 기대되며, 추가 주주환원의 일환으로 평가됨."], "risks": [], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650248.pdf", "json_path": "../reports_json/산업/650248.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650248"}, {"report_idx": "650244", "category": "산업", "published_at": "2026-06-25", "title": "AI는 무엇으로, 어떻게 돈을 벌 수 있을까? (ft. 심천탐방기시즌2)", "author": "이창영, 하현수, 백종민", "source": "유안타증권", "company_name": null, "stock_code": null, "industry_name": "AI 및 AI 데이터센터 산업", "market_topic": "AI 데이터센터 투자 및 수익화 가능성, 중국 AI 산업 현황, AI 관련 신수익모델", "investment_opinion": null, "target_price": null, "summary": "본 산업 리포트는 AI 데이터센터 투자 확대와 관련 반도체 가격 상승 현상을 배경으로, 수십조 달러 규모의 AI 인프라 투자에 대해 실제 경제적 수익 창출 가능성을 분석하였다. AI가 미래 산업 전반에 영향을 미칠 것으로 기대되는 가운데, 핵심 수익모델로 AI 에이전트, 토큰 비즈니스, AI 신약 개발과 디지털 생물학 분야를 제시하였다. 또한, 중국의 정부 지원 속에 성장하는 AI 및 휴머노이드 로봇 산업 현황을 심천 현지 탐방을 통해 점검하고, Open AI 및 Anthropic과 같은 신생기업의 수익화 가능성을 IPO 이전 관점에서 분석하여 투자자들이 직면할 수 있는 '시간 차이'와 투자 위험 요인을 제시한다. 본 보고서는 AI 산업 내 투자가 높은 잠재력과 함께 동시에 현존하는 거품 및 수익성 불확실성 위험을 내포하고 있음을 강조한다.", "key_points": ["GPU 및 메모리 가격 급등으로 반도체 기업 주가 상승", "수십조 달러 규모 AI 데이터센터 신규 증설 및 투자 확대", "AI 데이터센터의 수익화(ROI) 가능성에 대한 근본적 의문 제기", "AI 에이전트, 토큰 비즈니스, AI 신약 개발·디지털 생물학을 중심으로 AI 수익 모델 탐색", "중국 정부 지원과 내수 시장 기반의 AI 및 휴머노이드 로봇 산업 발전 현지 점검", "2026~2027년 IPO 예정인 Open AI, Anthropic의 AI 인프라 수익화 가능성 심층 분석", "AI가 모든 산업에 장기 적용 가능하나 수익 창출까지 상당한 시간 차이 존재 예상"], "risks": ["AI 데이터센터에 대한 대규모 자본 투자가 기대하는 수준의 수익을 창출하지 못할 위험", "과도한 반도체 및 인프라 가격 상승이 거품일 가능성", "AI 수익 모델이 예상보다 지연되거나 실현 불가할 위험"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650244.pdf", "json_path": "../reports_json/산업/650244.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650244"}, {"report_idx": "650242", "category": "산업", "published_at": "2026-06-25", "title": "금리인상에도 하반기 대손비용 상승 폭은 제한적일 전망", "author": "전배승", "source": "LS증권", "company_name": null, "stock_code": null, "industry_name": "은행", "market_topic": "금리인상에 따른 은행권 이익가시성 확보 및 대손비용 상승 폭 제한적 전망", "investment_opinion": null, "target_price": null, "summary": "은행 산업은 하반기 금리인상 가능성에도 경기 개선이 동반되어 대손비용 상승 폭이 제한적일 것으로 전망된다. 은행권은 이자이익 증가와 함께 높은 이익가시성을 확보하고 있으나, 대출금리 상승에 따른 대손부담 증가는 후행적으로 나타날 가능성이 있다. 금융당국과 은행들은 포용금융 확대를 위한 대규모 지원책을 마련 중이며, 이는 금융권 비용으로 작용할 것으로 보인다. 전반적으로 은행권의 건전성 지표는 크게 악화되지 않았으며, 금리인상 및 정책 변화에 따른 리스크를 점진적으로 관리할 필요가 있다.", "key_points": ["하반기 추가 금리인상 가능성이 높아 은행권 이자이익 증가와 이익가시성 확보 전망", "경기 개선이 금리인상 배경으로 대출금리 상승 폭 크지 않아 차주 재무여건 악화 제한적", "1분기 은행권 고정이하여신비율 상승, 커버리지비율 하락 등 일부 건전성 지표 악화 있으나 전반적 자산건전성은 양호", "대손비용 상승은 금리인상 후 후행적으로 나타날 가능성이 높아 하반기 급격한 증가 예상 안됨", "포용금융 확대압력이 고조될 전망이며, 5대 금융지주가 약 70조원 규모의 포용금융 계획 발표 및 확대 중", "포용금융 확대는 서민금융지원, 기금출연 등 금융권 비용부담 수반하나 정책리스크 표면화까지 시간 소요 예상"], "risks": ["대출금리 상승에 따른 대손부담 증가 가능성", "포용금융 확대에 따른 은행권 비용 부담 증가 위험", "금리인상 지속 시 차주의 재무여건 악화 가능성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650242.pdf", "json_path": "../reports_json/산업/650242.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650242"}, {"report_idx": "650241", "category": "산업", "published_at": "2026-06-25", "title": "[IBKS Spot Comment] : [Micron technology] 26년 3분기 실적 리뷰", "author": "김운호", "source": "IBK투자증권", "company_name": null, "stock_code": null, "industry_name": "-", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "AI 수요 증대로 인한 가격 상승과 공급 부족 현상이 메모리 시장을 주도하며, Micron Technology의 26년 3분기 실적이 크게 개선됨. 전략적 고객 계약 및 대규모 CAPEX 투자가 이루어지고 있으나, NAND 부문은 시장 대비 다소 낮은 성장률을 보일 전망임. 2027년 이후 공급 부족 해소가 기대되는 가운데, 메모리 산업 전반에 신성장 국면이 도래하고 있음을 시사함.", "key_points": ["2026년 3분기 Micron Technology의 실적은 시장 컨센서스를 큰 폭으로 상회하였음. 매출액은 전년 동기 대비 346%, 전분기 대비 74% 증가한 415억 달러를 기록, EPS도 컨센서스 대비 높음.", "주요 성장 동력은 AI 수요에 따른 메모리 가격 상승으로 구체적으로 DRAM 매출액은 313억 달러, NAND 매출액은 99억 달러로 각각 전분기 대비 큰 폭 상승.", "Bit Growth는 DRAM에서 약 20% 초중반, NAND에서 약 20% 내외로 예상되며 Micron의 DRAM은 시장 수준 성장, NAND는 시장 대비 다소 하회할 전망.", "2026년 총 CAPEX는 270억 달러로 예상되며 2027년에도 분기별 CAPEX가 4분기 수준을 상회하여 투자가 지속될 전망.", "AI 수요로 인한 공급 부족에 따른 가격 상승이 이어지고 있으며, 공급 부족이 해소되는 시점은 2027년 이후로 예상됨.", "SCA(Strategic Customer Agreement) 체결이 특징적이며, 16개 업체와 계약, 계약 기간은 대체로 5년(자동차 부문은 3년), 가격은 2026년 2분기 수준 이하로 떨어지지 않을 것으로 전망됨.", "이 계약들은 DRAM 물량의 20%, NAND 물량의 약 33% 차지하며, 최종적으로 매출의 50% 이상을 차지할 것으로 예측됨.", "메모리 산업에는 AI 시대가 열리면서 구조적 변화와 성장 가능성이 높아지고 있음."], "risks": ["2027년 이후에야 공급 부족이 해소될 것으로 예상되어 단기적 공급 리스크 존재", "Micron의 NAND 성장률이 시장 수준을 밑돌 것으로 전망되는 점은 경쟁력 및 시장 점유율에 부정적 영향 가능성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650241.pdf", "json_path": "../reports_json/산업/650241.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650241"}, {"report_idx": "650239", "category": "산업", "published_at": "2026-06-25", "title": "[인터넷/게임] IBKS Daily", "author": "이승훈, 박상준", "source": "IBK투자증권", "company_name": null, "stock_code": null, "industry_name": "인터넷/게임", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "국내 인터넷 및 게임 산업은 투자시장 위축과 신작 부진으로 중소 게임사 중심으로 파산이 증가하며 어려움을 겪고 있다. 대형 게임사들은 최대 실적을 내고 있으나 기존 IP에 대한 높은 의존도가 국내 게임 산업 생태계의 다양성과 지속가능성에 부정적 영향을 미치고 있다. 동시에 크래프톤을 중심으로 AI 및 로보틱스 기술을 접목한 신사업 전환 시도가         document.body.removeChild(textarea);
      }
      alert(`종목코드 복사: ${stockCode}`);
    }

    async function fetchReportsForDate(date) {
      if (!date) return [];
      if (reportCache.has(date)) return reportCache.get(date) || [];
      try {
        const response = await fetch(`./archive/${date}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextReports = payload.reports || [];
        reportCache.set(date, nextReports);
        return nextReports;
      } catch (error) {
        return null;
      }
    }

    async function ensureHistoryLoaded() {
      if (historyLoaded) return true;
      for (const date of availableDates) {
        const loaded = await fetchReportsForDate(date);
        if (loaded === null) return false;
      }
      historyLoaded = true;
      return true;
    }

    function allCachedReports() {
      return Array.from(reportCache.values()).flat();
    }

    function stockCatalog() {
      const grouped = new Map();
      for (const item of allCachedReports()) {
        if (item.category !== "기업" || !item.stock_code) continue;
        const key = item.stock_code;
        if (!grouped.has(key)) {
          grouped.set(key, {
            stock_code: item.stock_code,
            company_name: item.company_name || item.title || item.stock_code,
            report_count: 0,
            dates: new Set(),
            latest_date: item.published_at || "",
          });
        }
        const stock = grouped.get(key);
        stock.report_count += 1;
        if (item.company_name) stock.company_name = item.company_name;
        if (item.published_at) stock.dates.add(item.published_at);
        if ((item.published_at || "") > stock.latest_date) stock.latest_date = item.published_at || "";
      }
      return Array.from(grouped.values());
    }

    function renderSearchResults(htmlText) {
      document.getElementById("search-results").innerHTML = htmlText;
    }

    function renderHistoryEmpty(message) {
      const root = document.getElementById("history-section");
      root.innerHTML = `<div class="history-empty">${safe(message)}</div>`;
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }

    function renderHistoryReportCard(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" 쨌 ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <h3 class="history-report-title">${safe(item.title)}</h3>
            <div class="report-brief">${meta}</div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStock(stockCode) {
      renderHistoryForStockCompact(stockCode);
    }

    function renderHistoryReportCardCompact(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" / ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <div class="history-title-row">
              <h3 class="history-report-title">${safe(item.title)}</h3>
              ${item.published_at ? `<span class="badge">${safe(item.published_at)}</span>` : ""}
            </div>
            <div class="report-brief">${meta}</div>
            <p class="summary">${safe(item.summary)}</p>
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문</a>
            </div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStockCompact(stockCode) {
      const entries = allCachedReports()
        .filter((item) => item.stock_code === stockCode)
        .sort((a, b) => {
          const dateDiff = (b.published_at || "").localeCompare(a.published_at || "");
          if (dateDiff !== 0) return dateDiff;
          return String(b.report_idx || "").localeCompare(String(a.report_idx || ""));
        });
      const root = document.getElementById("history-section");
      if (!entries.length) {
        renderHistoryEmpty("?대떦 醫낅ぉ????λ맂 ?대젰???놁뒿?덈떎.");
        return;
      }

      const companyName = entries.find((item) => item.company_name)?.company_name || stockCode;
      const uniqueDates = new Set(entries.map((item) => item.published_at).filter(Boolean));
      const bestEntry = entries.find((item) => item.alpha_score !== null && item.alpha_score !== undefined);
      const cards = entries.map((item) => renderHistoryReportCardCompact(item)).join("");

      root.innerHTML = `
        <article class="group-card history-group-card">
          <div class="group-head">
            <div>
              <div class="group-title-row">
                <h2 class="group-title">${safe(companyName)}</h2>
              </div>
            </div>
          </div>
          <div class="group-meta">
            <span class="pill"><button type="button" data-copy-stock="${safe(stockCode)}">종목코드 복사</button></span>
            <span class="pill"><a href="${stockWebUrl(stockCode)}" target="_blank" rel="noreferrer">네이버금융</a></span>
          </div>
          <div class="report-stack">${cards}</div>
        </article>
      `;
    }

    async function runStockSearch() {
      const input = document.getElementById("stock-search");
      const query = String(input.value || "").trim();
      if (!query) {
        renderSearchResults("");
        renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
        return;
      }

      renderSearchResults('<span class="badge">아카이브 확인 중...</span>');
      const loaded = await ensureHistoryLoaded();
      if (!loaded) {
        renderSearchResults("");
        renderHistoryEmpty("아카이브를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      const matches = matchingStocks(query).slice(0, 12);
      if (!matches.length) {
        renderSearchResults("");
        renderHistoryEmpty(`"${query}"와 일치하는 종목 이력이 없습니다.`);
        return;
      }

      renderSearchResults(
        matches
          .map(
            (item) => `
              <button type="button" data-stock-history="${safe(item.stock_code)}">
                ${safe(item.company_name)} (${safe(item.stock_code)}) · ${item.report_count}건
              </button>
            `
          )
          .join("")
      );
      renderHistoryForStockCompact(matches[0].stock_code);
    }

    function renderFactorSections(item) {
      if (item.category !== "기업") return "";
      const sections = [];
      if (item.revision_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Revision Signal</div><p class="factor-text">${safe(item.revision_signal)}</p></div>`);
      }
      if (item.structural_growth_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Structural Growth</div><p class="factor-text">${safe(item.structural_growth_signal)}</p></div>`);
      }
      if (item.valuation_risk_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Valuation / Risk</div><p class="factor-text">${safe(item.valuation_risk_signal)}</p></div>`);
      }
      const positiveText = (item.positive_factors || []).map((value) => `+ ${safe(value)}`).join("<br>");
      const negativeText = (item.negative_factors || []).map((value) => `- ${safe(value)}`).join("<br>");
      if (positiveText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Positive Factors</div><p class="factor-text">${positiveText}</p></div>`);
      }
      if (negativeText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Negative Factors</div><p class="factor-text">${negativeText}</p></div>`);
      }
      if (item.market_reaction_placeholder) {
        sections.push(`<div class="factor-box"><div class="factor-title">Market Reaction</div><p class="factor-text">D+1 / D+5 / D+20 추후 연결 예정</p></div>`);
      }
      return sections.length ? `<div class="factor-grid">${sections.join("")}</div>` : "";
    }

    function renderGrouped(items) {
      const root = document.getElementById("list");
      const { groupedCompanies, industry, market } = groupedData(items);

      const groupCards = groupedCompanies.map((group) => {
        const reportsHtml = group.reports.map((report) => {
          const pointItems = (report.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
          return `
            <details class="report-detail">
              <summary>
                <div>
                  <div>${safe(report.title)}</div>
                  <div class="report-brief">${[
                    safe(report.source),
                    safe(report.author),
                    [safe(report.investment_opinion), safe(report.target_price)].filter(Boolean).join(" "),
                    upsideLabel(report),
                  ].filter(Boolean).join(" · ")}</div>
                </div>
                <div>
                  ${report.alpha_score !== null && report.alpha_score !== undefined ? `<div class="badge">${safe(report.alpha_grade || "-")} ${safe(report.alpha_score)}</div>` : ""}
                  <div class="badge">#${safe(report.report_idx)}</div>
                </div>
              </summary>
              <div class="report-body">
                <p class="summary">${safe(report.summary)}</p>
                ${pointItems ? `<ul class="points">${pointItems}</ul>` : ""}
                ${renderFactorSections(report)}
                <div class="links">
                  <a href="${safe(report.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
                </div>
              </div>
            </details>
          `;
        }).join("");

        return `
          <article class="group-card">
            <div class="group-head">
              <div>
                <div class="group-title-row">
                  <h2 class="group-title">${safe(group.company_name)}</h2>
                  ${renderPriceBox(group)}
                </div>
              </div>
            </div>
            <div class="group-meta">
              ${group.stock_code ? `<span class="pill"><button type="button" data-copy-stock="${safe(group.stock_code)}">종목코드 복사</button></span>` : ""}
              ${group.stock_code ? `<span class="pill"><a href="${stockWebUrl(group.stock_code)}" target="_blank" rel="noreferrer">네이버금융</a></span>` : ""}
            </div>
            <div class="report-stack">${reportsHtml}</div>
          </article>
        `;
      }).join("");

      const renderStandaloneSection = (title, entries) => entries.length
        ? `
          <div class="section-title">${title}</div>
          ${entries.map((item) => `
            <article class="card">
              <div class="row">
                <span class="badge">${safe(item.category)}</span>
                <span class="badge">${safe(item.published_at)}</span>
                <span class="badge">#${safe(item.report_idx)}</span>
              </div>
              <h2 class="title">${safe(item.title)}</h2>
              <div class="meta">작성자 ${safe(item.author)} · 출처 ${safe(item.source)}${item.market_topic ? ` · 주제 ${safe(item.market_topic)}` : ""}${item.industry_name ? ` · 산업 ${safe(item.industry_name)}` : ""}</div>
              <p class="summary">${safe(item.summary)}</p>
              ${renderFactorSections(item)}
              <div class="links">
                <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
              </div>
            </article>
          `).join("")}
        `
        : "";

      root.innerHTML = groupCards
        + renderStandaloneSection("산업 리포트", industry)
        + renderStandaloneSection("시장 리포트", market);
    }

    function renderList(items) {
      const root = document.getElementById("list");
      root.innerHTML = items.map((item) => {
        const meta = [
          item.author ? `작성자 ${item.author}` : "",
          item.source ? `출처 ${item.source}` : "",
          item.company_name ? `회사 ${item.company_name}` : "",
          item.stock_code ? `코드 ${item.stock_code}` : "",
          item.industry_name ? `산업 ${item.industry_name}` : "",
          item.market_topic ? `주제 ${item.market_topic}` : "",
          item.investment_opinion ? `의견 ${item.investment_opinion}` : "",
          item.target_price ? `목표가 ${item.target_price}` : "",
          upsideLabel(item),
          item.alpha_score !== null && item.alpha_score !== undefined ? `Alpha ${item.alpha_grade || "-"} ${item.alpha_score}` : "",
          item.live_price ? `현재가 ${item.live_price}원` : "",
        ].filter(Boolean).join(" · ");
        const points = (item.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
        return `
          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.category)}</span>
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            ${renderAlphaBox(item)}
            <p class="summary">${safe(item.summary)}</p>
            ${points ? `<ul class="points">${points}</ul>` : ""}
            ${renderFactorSections(item)}
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      renderModes();
      renderDateOptions();
      renderFilters();
      const items = filteredReports();
      renderStats(items);
      if (currentMode === "grouped") {
        renderGrouped(items);
      } else {
        renderList(items);
      }
    }

    async function switchDate(nextDate) {
      if (!nextDate || nextDate === currentDate) return;
      const nextReports = await fetchReportsForDate(nextDate);
      if (nextReports === null) {
        alert(`브리프를 불러오지 못했습니다: ${nextDate}`);
        renderDateOptions();
        return;
      }
      currentDate = nextDate;
      reports = nextReports;
      render();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-copy-stock]");
      if (!trigger) return;
      event.preventDefault();
      await copyStockCode(trigger.getAttribute("data-copy-stock"));
    });

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-stock-history]");
      if (!trigger) return;
      event.preventDefault();
      renderHistoryForStockCompact(trigger.getAttribute("data-stock-history"));
    });

    document.getElementById("search-button").addEventListener("click", () => {
      runStockSearch();
    });

    document.getElementById("stock-search").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      runStockSearch();
    });

    render();
    renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
  </script>
</body>
