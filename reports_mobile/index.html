{"report_idx": "650616", "category": "시장", "published_at": "2026-07-09", "title": "[파이한입] #05 미결제약정 맛보기", "author": "투자전략실", "source": "LS증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "미결제약정(Open Interest) 이해와 시장 내 수급 신호 분석", "investment_opinion": null, "target_price": null, "summary": "이 보고서는 미결제약정(Open Interest)의 개념과 중요성을 선물 및 옵션 시장에서의 수급 상황과 연계하여 설명한다. 미결제약정은 시장 내 포지션 크기와 투자자의 베팅 강도를 간접적으로 보여주는 중요한 지표이며, 특히 선물 시장에서는 신규 포지션 증가와 가격 변동 추이의 결합 분석을 통해 상승 또는 하락 시장 스탠스를 이해할 수 있다. 또한, 레버리지 ETF의 확대가 미결제약정 증가에 영향을 준 점을 강조한다. 옵션 시장에서는 행사가, 콜/풋, 만기에 따른 미결제약정 집중 현상이 향후 가격 민감도와 헤지 수급 변화를 예고하는 시그널로 작용한다. 다만 미결제약정 신호는 다양한 변수에 영향을 받으므로, 다각적 분석과 보완적 해석이 요구된다.", "key_points": ["미결제약정은 아직 청산되지 않은 선물 및 옵션 계약 수를 의미하며, 시장 내 포지션 규모와 수급 무게중심을 나타낸다.", "선물 미결제약정 증가는 신규 포지션 진입 증가를 뜻하며, 가격 상승과 동반 시 상승 베팅 강화로 해석된다.", "가격 상승에도 미결제약정 감소 시 기존 매도 포지션 청산(숏커버) 가능성을 시사한다.", "레버리지 ETF 시장 확장이 선물 미결제약정 증가의 주요 요인으로 작용한다.", "옵션 미결제약정은 콜/풋, 행사가격, 만기 등에 따라 세분화되어 포지션 집중 기업별 가격대 확인 수단이 된다.", "옵션 미결제약정 집중 지역은 델타 및 감마 헤지 수급과 가격 민감도 급변 가능성의 지표로 사용된다."], "risks": ["미결제약정 해석은 거래 주체, 만기, 변동성 등의 복합 요인에 따라 달라질 수 있어 단독 신호로 과도한 해석 지양 필요", "레버리지 ETF의 미결제약정 증가가 시장 과확장과 변동성 상승 요인이 될 수 있음"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/650616.pdf", "json_path": "../reports_json/시장/650616.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650616"}, {"report_idx": "650615", "category": "시장", "published_at": "2026-07-09", "title": "[파이한입] #04 레버리지 ETF 맛보기", "author": "투자전략실", "s ": "전략공감2.0", "author": "리서치센터", "source": "메리츠증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "국민연금 리밸런싱과 외국인 반도체 매매 패턴 분석 및 미국·중국 해상 발사장 인프라와 우주 감시체계 관련 전략 이슈", "investment_opinion": null, "target_price": null, "summary": "최근 KOSPI는 역사적 저PER 수준을 기록 중이나 이익 추정치는 견조하다. 국민연금 국내주식 비중 조정으로 매도 압력은 완화되고 있으나, 외국인의 반도체 매도 패턴은 전형적인 사이클을 따르며 향후 수급에 불확실성을 내포한다. 우주산업 측면에서는 미국의 발사 수요 급증으로 지상 발사장 인프라가 한계에 봉착, 중국이 해상 발사 인프라를 구축하며 선도하고 있다. 해상 발사는 육상 발사의 제약을 극복하며 군사적 의미도 커져 관련 우주 감시 예산이 미국과 한국에서 크게 증가하고 있다. 향후 발사 인프라 경쟁과 우주 감시 체계 개발이 시장과 전략 주제에서 중요한 변수로 작용할 전망이다.", "key_points": ["국민연금의 국내주식 비중은 7월 기준 SAA 허용범위 내로 매도 압력이 완화 전망", "외국인은 반도체 영업이익 증가율 정점 전에 매도하는 사이클적 패턴을 보이고 있으나, 구조적 이탈 여부 불확실", "KOSPI 12MF PER은 6.25배로 2005년 이후 최저 수준이나 이익 추정치는 오히려 상승 중", "미국 연간 궤도 발사체 수요 급증으로 발사장 인프라가 포화 상태에 근접", "중국은 해상 발사 인프라와 로켓 제조 시설이 밀집한 산둥성 하이양 우주클러스터에서 해상 발사를 선도 중", "해상 발사는 육상 발사가 갖는 공역 제약을 해소하고 발사 위치 이동으로 탑재 중량 효율화 가능", "미국은 우주군 감시 및 정찰 위성 예산을 대폭 증액하며 우주 감시 능력 강화 추진", "한국도 해상 발사선 개발과 군 감시 위성(425사업)을 통해 우주 감시 및 발사능력 확보에 집중 중"], "risks": ["국민연금 비중 변동에 따른 변동성 가능성", "외국인 투자자의 반도체 매도 패턴이 지속될 경우 시장 부진 심화 위험", "발사장 인프라 부족이 신속한 위성 발사 및 우주기술 경쟁 저해 가능성", "해상 발사 확산에 따른 군사적 긴장 및 대응 비용 증가 위험"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/650596.pdf", "json_path": "../reports_json/시장/650596.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650596"}, {"report_idx": "650585", "category": "시장", "published_at": "2026-07-09", "title": "한화그룹 프리뷰", "author": "리서치센터", "source": "대신증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "한화그룹 지배구조 개편 및 사업 포트폴리오 재편", "investment_opinion": null, "target_price": null, "summary": "한화그룹은 2026년 8월 1일 인적분할을 통해 지배구조를 개편하며, 존속법인 ㈜한화와 신설지주회사로 사업 포트폴리오를 분리한다. 존속법인은 방산·조선·에너지·금융 등 핵심 사업을 유지하고, 신설법인은 기술 및 생활 솔루션 중심의 서비스·유통 사업군으로 구성된다. 이번 구조 개편은 복합기업 할인 해소와 각 사업군에 특화된 전략 의사결정을 촉진하기 위한 조치로, 그룹 내 주요 핵심 소유구조가 유지되면서 포트폴리오의 명확화와 사업 효율성을 높이는 데 중점을 둔다. 분할과 관련한 주주환원 정책도 계획 중이며, 지배구조 재편이 그룹 경쟁력 강화에 기여할 것으로 예상된다.", "key_points": ["㈜한화가 인적분할을 통해 신설지주회사를 설립, 존속법인과 신설법인의 지분 비율은 각각 75.6%, 24.4%임.", "존속법인은 기존 상장 유지, 신설법인은 재상장 심사 후 유가증권시장 재상장 예정.", "분할 목적은 복합기업 할인 해소 및 사업군별 전략적 의사결정 효율성 제고.", "존속법인은 방위산업, 조선, 에너지, 금융 등 핵심 사업 중심의 포트폴리오 유지.", "신설법인은 기술 솔루션 및 생활 솔루션 부문 등 서비스·유통 사업군으로 구성.", "핵심 소유구조(㈜한화→한화에어로스페이스→한화오션)가 존속법인에 잔류해 방산·조선 부문 안정성 유지.", "분할 관련 주주환원 정책으로 주식 소각 등이 예정되어 있으며, 분할 일정은 2026년 7월 임시주총, 8월 분할, 8월 말 변경·재상장 예정.", "이번 지배구조 개편은 사업 포트폴리오 명확화 및 그룹 내 전략적 의사결정 체계 개선에 초점."], "risks": ["인적분할과 재상장 과정에서의 시장 변동성 및 투자자 신뢰 변화 가능성", "지배구조 개편 후 사업별 시너지 효과 불확실성", "주주환원 정책 이행 과정에서 예상치 못한 재무적 영향 발생 가능성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/650585.pdf", "json_path": "../reports_json/시장/650585.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650585"}, {"report_idx": "650582", "category": "시장", "published_at": "2026-07-09", "title": "morning meeting brief", "author": "리서치센터", "source": "대신증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "KOSPI 지수 변동성 확대 및 레벨다운, 중동발 지정학적 리스크에 따른 투자심리 위축, 미국 바이오테크 ETF 강세와 국내 반도체 ETF 집중 현상", "investment_opinion": null, "target_price": null, "summary": "7월 들어 KOSPI는 변동성 확대와 지정학적 리스크로 7,200선대 레벨다운 되었다. 반도체 업종 중심의 레버리지 청산과 중동발 군사적 긴장이 위험자산 선호를 급격히 약화시켰다. 하지만 선행 EPS 상승과 금융위기 저점 대비 낮은 PER 수준 등 펀더멘털은 견고하여 가격 매력은 높은 상황이다. ETF 시장에서는 미국 바이오테크 부문이 실적 기대와 M&A 활성화로 강세를 보이며 박스권을 돌파하는 반면, 국내 시장은 여전히 반도체 집중 현상이 뚜렷하다. 달러-원 환율은 1,500원 선을 하회하며 외국인 순매수가 전환되는 등 수급 변화가 나타나고 있으나 높은 변동성은 당분간 지속될 전망이다. 중동발 리스크와 투자심리 위축으로 전 업종 약세가 나타나는 가운데 가격매력을 기반으로 한 신중한 매집 전략이 유효한 시점이다.", "key_points": ["KOSPI는 7,200선대 레벨다운, 40일·50일 이동평균선 하회하며 변동성 확대 중.", "올해 여섯 번째 서킷 브레이커 발동, 투자심리와 수급 변동성에 큰 영향.", "실적/펀더멘털은 견고하나 반도체 투자 집중과 레버리지 청산으로 수급 충격 발생.", "선행 PER 6.17배로 금융위기 당시 저점보다 낮은 저평가 국면.", "중동발 군사적 긴장과 반도체 투심 약화로 위험자산 선호 급격히 위축.", "달러-원 환율 1,500원 선 하회하며 외국인 순매수 전환, 기관은 지속 순매도.", "전 업종 무차별적 약세, 특히 전력기기, 조선, 방산 업종 낙폭 두드러짐.", "미국 바이오테크 ETF는 실적 기대, M&A 및 IPO 활성화로 박스권 돌파.", "국내 ETF는 반도체 쏠림 현상 심화, 미국은 채권형 ETF로 자금 유입 확대."], "risks": ["중동 군사 충돌 확대 가능성에 따른 지정학적 리스크 지속.", "반도체 업종 집중 및 레버리지 투자 청산으로 인한 수급 불안정성.", "투자심리 위축으로 인한 전 업종 약세와 변동성 확대로 단기 주가 불안정성."], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/650582.pdf", "json_path": "../reports_json/시장/650582.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650582"}, {"report_idx": "650622", "category": "산업", "published_at": "2026-07-09", "title": "6월 항공사 실적: 정상화 과정", "author": "이서연", "source": "상상인증권", "company_name": null, "stock_code": null, "industry_name": "항공", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "6월 항공 산업은 국제선 여객과 화물 수송에서 전년 대비 성장세를 지속하고 있으나, 미-이란 전쟁 영향에 따른 환승 수요 변동과 유류할증료 상승으로 전월 대비 성장률은 둔화된 모습이다. 장거리 노선과 고단가 화물 수요 강세가 유지되면서 3분기부터는 유가 하락에 힘입어 실적 회복이 기대된다. 동남아 노선은 계절적 비수기로 인해 운송 수요가 감소하였고, 항공사별로는 대한항공이 구조적 업황 호조와 중동 캐리어 공급 감소 혜택을 받아 비용 부담을 다소 완화할 전망이다.", "key_points": ["6월 전국 공항의 국제선 여객 수송은 약 793만 명으로 전년 동기 대비 4% 증가하였으나 전월 대비 성장률은 감소했다.", "장거리 노선에서는 미주 노선이 전년 대비 10%, 유럽 노선이 7% 성장하였으나 미-이란 전쟁 관련 환승 수요 반사 효과가 소강상태이며 유류할증료 상승 영향으로 성장률 둔화.", "단거리 노선은 일본(13%), 중국(18%) 여전히 강한 성장세를 보이나 동남아 노선은 여름 비수기에 따른 공급 조절로 하락 폭이 평년 대비 큼.", "6월 인천국제공항 화물 수송은 26.2만 톤으로 전년보다 5% 증가했고, 상하이발 항공화물 운임 지수도 전년 대비 36%, 전월 대비 2% 상승하며 강세를 보임.", "AI 반도체 및 전력기반 설비 수요 증가로 고단가 화물 운송 수요가 확대되고 있으며, 유류할증료 상승이 운임 상승에 일부분 영향을 끼침.", "미-이란 전쟁 리스크에도 불구하고 6월부터 원유(WTI) 가격이 하락세를 보이며 항공유 가격도 완화되어 3분기부터는 실적 점진적 회복 기대.", "대한항공은 중동 항공사 공급 감소로 장거리 노선 수요 증가 및 항공 화물 사업 호조로 2분기 비용 부담 일부 완화 가능성이 높음."], "risks": ["미-이란 전쟁과 관련한 지정학적 리스크로 환승 수요 불확실성 존재.", "유류할증료 상승과 원자재 가격 변동성이 항공사의 비용 구조에 영향.", "동남아 노선은 시즌적 비수기로 인한 공급 조절로 성장 둔화 우려."], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650622.pdf", "json_path": "../reports_json/산업/650622.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650622"}, {"report_idx": "650619", "category": "산업", "published_at": "2026-07-09", "title": "2Q26 Preview: 영업이익 +15% YoY", "author": "김도하", "source": "한화투자증권", "company_name": null, "stock_code": null, "industry_name": "은행", "market_topic": "2Q26 실         .map((date) => `<option value="${safe(date)}"${date === currentDate ? " selected" : ""}>${safe(date)}</option>`)
        .join("");
      root.onchange = async (event) => {
        await switchDate(event.target.value);
      };
    }

    function renderFilters() {
      const root = document.getElementById("filters");
      root.innerHTML = "";
      for (const category of categories) {
        const button = document.createElement("button");
        button.textContent = category;
        if (category === current) button.classList.add("active");
        button.onclick = () => {
          current = category;
          render();
        };
        root.appendChild(button);
      }
    }

    function renderStats(items) {
      const root = document.getElementById("stats");
      root.innerHTML = "";
      document.getElementById("subline").textContent = "";
      document.getElementById("subline").style.display = "none";
    }

    function formatQuoteAsOf(value) {
      const text = safe(value);
      const matched = text.match(/(\d{4}\.\d{2}\.\d{2})/);
      if (matched) return `${matched[1].slice(2)} 장마감 기준`;
      return text
        .replace(/^현재가\s*/, "")
        .replace(/\s*기준(?:\(KRX 장마감\)|\(장마감\)|\(KRX장마감\)|\(KRX 마감\))?/g, "")
        .trim();
    }

    function priceDirectionClass(group) {
      const explicit = safe(group.live_price_direction).toLowerCase();
      if (explicit === "up" || explicit === "rise") return "up";
      if (explicit === "down" || explicit === "fall") return "down";

      const changeAmount = parsePriceValue(group.live_price_change);
      const changeRate = parsePriceValue(group.live_price_rate);
      if (Number.isFinite(changeAmount) && changeAmount < 0) return "down";
      if (Number.isFinite(changeRate) && changeRate < 0) return "down";
      if (Number.isFinite(changeAmount) && changeAmount > 0) return "up";
      if (Number.isFinite(changeRate) && changeRate > 0) return "up";

      const text = `${safe(group.live_price_change)} ${safe(group.live_price_rate)}`;
      if (text.includes("-")) return "down";
      return "";
    }

    function renderSparkline(history) {
      const values = (history || [])
        .map((item) => parsePriceValue(item.close))
        .filter((value) => Number.isFinite(value));
      if (values.length < 2) return "";

      const width = 220;
      const height = 40;
      const padding = 2;
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const range = Math.max(maxValue - minValue, 1);
      const points = values.map((value, index) => {
        const x = padding + ((width - padding * 2) * index) / (values.length - 1);
        const y = height - padding - ((value - minValue) / range) * (height - padding * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const lastPoint = points[points.length - 1].split(",");
      const trendUp = values[values.length - 1] >= values[0];
      const stroke = trendUp ? "#0d7a5f" : "#ca6702";
      return `
        <div class="price-chart" aria-label="최근 3개월 주가 추이">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-hidden="true">
            <polyline fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${points.join(" ")}"></polyline>
            <circle cx="${lastPoint[0]}" cy="${lastPoint[1]}" r="2.8" fill="${stroke}"></circle>
          </svg>
        </div>
        <div class="price-caption">[3개월 주가 추이]</div>
      `;
    }

    function renderPriceBox(group) {
      if (!group.live_price) {
        return `
          <div class="price-box">
            <div class="price-label">현재가</div>
            <div class="price-main">조회 실패</div>
          </div>
        `;
      }

      const change = [safe(group.live_price_change), safe(group.live_price_rate)].filter(Boolean).join(" / ");
      const directionClass = priceDirectionClass(group);
      const high52w = safe(group.live_price_high_52w);
      return `
        <div class="price-box">
          <div class="price-label">${formatQuoteAsOf(group.live_price_as_of)}</div>
          <div class="price-main">${safe(group.live_price)}원</div>
          <div class="price-change ${directionClass}">${change}</div>
          ${high52w ? `<div class="price-extra">52주 최고가 ${high52w}원</div>` : ""}
          ${renderSparkline(group.price_history)}
        </div>
      `;
    }

    function renderAlphaBox(item) {
      if (item.alpha_score === null || item.alpha_score === undefined) return "";
      return `
        <div class="score-box">
          <div class="score-grade">Alpha ${safe(item.alpha_grade || "-")}</div>
          <div class="score-main">${safe(item.alpha_score)}</div>
          <div class="score-sub">${safe(item.score_reason || "")}</div>
        </div>
      `;
    }

    function stockWebUrl(stockCode) {
      if (!stockCode) return "";
      return `https://finance.naver.com/item/main.naver?code=${encodeURIComponent(stockCode)}`;
    }

    async function copyStockCode(stockCode) {
      if (!stockCode) return;
      try {
        await navigator.clipboard.writeText(String(stockCode));
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = String(stockCode);
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
      alert(`종목코드 복사: ${stockCode}`);
    }

    async function fetchReportsForDate(date) {
      if (!date) return [];
      if (reportCache.has(date)) return reportCache.get(date) || [];
      try {
        const response = await fetch(`./archive/${date}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextReports = payload.reports || [];
        reportCache.set(date, nextReports);
        return nextReports;
      } catch (error) {
        return null;
      }
    }

    async function ensureHistoryLoaded() {
      if (historyLoaded) return true;
      for (const date of availableDates) {
        const loaded = await fetchReportsForDate(date);
        if (loaded === null) return false;
      }
      historyLoaded = true;
      return true;
    }

    function allCachedReports() {
      return Array.from(reportCache.values()).flat();
    }

    function stockCatalog() {
      const grouped = new Map();
      for (const item of allCachedReports()) {
        if (item.category !== "기업" || !item.stock_code) continue;
        const key = item.stock_code;
        if (!grouped.has(key)) {
          grouped.set(key, {
            stock_code: item.stock_code,
            company_name: item.company_name || item.title || item.stock_code,
            report_count: 0,
            dates: new Set(),
            latest_date: item.published_at || "",
          });
        }
        const stock = grouped.get(key);
        stock.report_count += 1;
        if (item.company_name) stock.company_name = item.company_name;
        if (item.published_at) stock.dates.add(item.published_at);
        if ((item.published_at || "") > stock.latest_date) stock.latest_date = item.published_at || "";
      }
      return Array.from(grouped.values());
    }

    function renderSearchResults(htmlText) {
      document.getElementById("search-results").innerHTML = htmlText;
    }

    function renderHistoryEmpty(message) {
      const root = document.getElementById("history-section");
      root.innerHTML = `<div class="history-empty">${safe(message)}</div>`;
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }

    function renderHistoryReportCard(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" 쨌 ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <h3 class="history-report-title">${safe(item.title)}</h3>
            <div class="report-brief">${meta}</div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStock(stockCode) {
      renderHistoryForStockCompact(stockCode);
    }

    function renderHistoryReportCardCompact(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" / ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <div class="history-title-row">
              <h3 class="history-report-title">${safe(item.title)}</h3>
              ${item.published_at ? `<span class="badge">${safe(item.published_at)}</span>` : ""}
            </div>
            <div class="report-brief">${meta}</div>
            <p class="summary">${safe(item.summary)}</p>
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문</a>
            </div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStockCompact(stockCode) {
      const entries = allCachedReports()
        .filter((item) => item.stock_code === stockCode)
        .sort((a, b) => {
          const dateDiff = (b.published_at || "").localeCompare(a.published_at || "");
          if (dateDiff !== 0) return dateDiff;
          return String(b.report_idx || "").localeCompare(String(a.report_idx || ""));
        });
      const root = document.getElementById("history-section");
      if (!entries.length) {
        renderHistoryEmpty("?대떦 醫낅ぉ????λ맂 ?대젰???놁뒿?덈떎.");
        return;
      }

      const companyName = entries.find((item) => item.company_name)?.company_name || stockCode;
      const uniqueDates = new Set(entries.map((item) => item.published_at).filter(Boolean));
      const bestEntry = entries.find((item) => item.alpha_score !== null && item.alpha_score !== undefined);
      const cards = entries.map((item) => renderHistoryReportCardCompact(item)).join("");

      root.innerHTML = `
        <article class="group-card history-group-card">
          <div class="group-head">
            <div>
              <div class="group-title-row">
                <h2 class="group-title">${safe(companyName)}</h2>
              </div>
            </div>
          </div>
          <div class="group-meta">
            <span class="pill"><button type="button" data-copy-stock="${safe(stockCode)}">종목코드 복사</button></span>
            <span class="pill"><a href="${stockWebUrl(stockCode)}" target="_blank" rel="noreferrer">네이버금융</a></span>
          </div>
          <div class="report-stack">${cards}</div>
        </article>
      `;
    }

    async function runStockSearch() {
      const input = document.getElementById("stock-search");
      const query = String(input.value || "").trim();
      if (!query) {
        renderSearchResults("");
        renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
        return;
      }

      renderSearchResults('<span class="badge">아카이브 확인 중...</span>');
      const loaded = await ensureHistoryLoaded();
      if (!loaded) {
        renderSearchResults("");
        renderHistoryEmpty("아카이브를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      const matches = matchingStocks(query).slice(0, 12);
      if (!matches.length) {
        renderSearchResults("");
        renderHistoryEmpty(`"${query}"와 일치하는 종목 이력이 없습니다.`);
        return;
      }

      renderSearchResults(
        matches
          .map(
            (item) => `
              <button type="button" data-stock-history="${safe(item.stock_code)}">
                ${safe(item.company_name)} (${safe(item.stock_code)}) · ${item.report_count}건
              </button>
            `
          )
          .join("")
      );
      renderHistoryForStockCompact(matches[0].stock_code);
    }

    function renderFactorSections(item) {
      if (item.category !== "기업") return "";
      const sections = [];
      if (item.revision_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Revision Signal</div><p class="factor-text">${safe(item.revision_signal)}</p></div>`);
      }
      if (item.structural_growth_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Structural Growth</div><p class="factor-text">${safe(item.structural_growth_signal)}</p></div>`);
      }
      if (item.valuation_risk_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Valuation / Risk</div><p class="factor-text">${safe(item.valuation_risk_signal)}</p></div>`);
      }
      const positiveText = (item.positive_factors || []).map((value) => `+ ${safe(value)}`).join("<br>");
      const negativeText = (item.negative_factors || []).map((value) => `- ${safe(value)}`).join("<br>");
      if (positiveText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Positive Factors</div><p class="factor-text">${positiveText}</p></div>`);
      }
      if (negativeText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Negative Factors</div><p class="factor-text">${negativeText}</p></div>`);
      }
      if (item.market_reaction_placeholder) {
        sections.push(`<div class="factor-box"><div class="factor-title">Market Reaction</div><p class="factor-text">D+1 / D+5 / D+20 추후 연결 예정</p></div>`);
      }
      return sections.length ? `<div class="factor-grid">${sections.join("")}</div>` : "";
    }

    function renderGrouped(items) {
      const root = document.getElementById("list");
      const { groupedCompanies, industry, market } = groupedData(items);

      const groupCards = groupedCompanies.map((group) => {
        const reportsHtml = group.reports.map((report) => {
          const pointItems = (report.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
          return `
            <details class="report-detail">
              <summary>
                <div>
                  <div>${safe(report.title)}</div>
                  <div class="report-brief">${[
                    safe(report.source),
                    safe(report.author),
                    [safe(report.investment_opinion), safe(report.target_price)].filter(Boolean).join(" "),
                    upsideLabel(report),
                  ].filter(Boolean).join(" · ")}</div>
                </div>
                <div>
                  ${report.alpha_score !== null && report.alpha_score !== undefined ? `<div class="badge">${safe(report.alpha_grade || "-")} ${safe(report.alpha_score)}</div>` : ""}
                  <div class="badge">#${safe(report.report_idx)}</div>
                </div>
              </summary>
              <div class="report-body">
                <p class="summary">${safe(report.summary)}</p>
                ${pointItems ? `<ul class="points">${pointItems}</ul>` : ""}
                ${renderFactorSections(report)}
                <div class="links">
                  <a href="${safe(report.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
                </div>
              </div>
            </details>
          `;
        }).join("");

        return `
          <article class="group-card">
            <div class="group-head">
              <div>
                <div class="group-title-row">
                  <h2 class="group-title">${safe(group.company_name)}</h2>
                  ${renderPriceBox(group)}
                </div>
              </div>
            </div>
            <div class="group-meta">
              ${group.stock_code ? `<span class="pill"><button type="button" data-copy-stock="${safe(group.stock_code)}">종목코드 복사</button></span>` : ""}
              ${group.stock_code ? `<span class="pill"><a href="${stockWebUrl(group.stock_code)}" target="_blank" rel="noreferrer">네이버금융</a></span>` : ""}
            </div>
            <div class="report-stack">${reportsHtml}</div>
          </article>
        `;
      }).join("");

      const renderStandaloneSection = (title, entries) => entries.length
        ? `
          <div class="section-title">${title}</div>
          ${entries.map((item) => `
            <article class="card">
              <div class="row">
                <span class="badge">${safe(item.category)}</span>
                <span class="badge">${safe(item.published_at)}</span>
                <span class="badge">#${safe(item.report_idx)}</span>
              </div>
              <h2 class="title">${safe(item.title)}</h2>
              <div class="meta">작성자 ${safe(item.author)} · 출처 ${safe(item.source)}${item.market_topic ? ` · 주제 ${safe(item.market_topic)}` : ""}${item.industry_name ? ` · 산업 ${safe(item.industry_name)}` : ""}</div>
              <p class="summary">${safe(item.summary)}</p>
              ${renderFactorSections(item)}
              <div class="links">
                <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
              </div>
            </article>
          `).join("")}
        `
        : "";

      root.innerHTML = groupCards
        + renderStandaloneSection("산업 리포트", industry)
        + renderStandaloneSection("시장 리포트", market);
    }

    function renderList(items) {
      const root = document.getElementById("list");
      root.innerHTML = items.map((item) => {
        const meta = [
          item.author ? `작성자 ${item.author}` : "",
          item.source ? `출처 ${item.source}` : "",
          item.company_name ? `회사 ${item.company_name}` : "",
          item.stock_code ? `코드 ${item.stock_code}` : "",
          item.industry_name ? `산업 ${item.industry_name}` : "",
          item.market_topic ? `주제 ${item.market_topic}` : "",
          item.investment_opinion ? `의견 ${item.investment_opinion}` : "",
          item.target_price ? `목표가 ${item.target_price}` : "",
          upsideLabel(item),
          item.alpha_score !== null && item.alpha_score !== undefined ? `Alpha ${item.alpha_grade || "-"} ${item.alpha_score}` : "",
          item.live_price ? `현재가 ${item.live_price}원` : "",
        ].filter(Boolean).join(" · ");
        const points = (item.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
        return `
          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.category)}</span>
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            ${renderAlphaBox(item)}
            <p class="summary">${safe(item.summary)}</p>
            ${points ? `<ul class="points">${points}</ul>` : ""}
            ${renderFactorSections(item)}
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      renderModes();
      renderDateOptions();
      renderFilters();
      const items = filteredReports();
      renderStats(items);
      if (currentMode === "grouped") {
        renderGrouped(items);
      } else {
        renderList(items);
      }
    }

    async function switchDate(nextDate) {
      if (!nextDate || nextDate === currentDate) return;
      const nextReports = await fetchReportsForDate(nextDate);
      if (nextReports === null) {
        alert(`브리프를 불러오지 못했습니다: ${nextDate}`);
        renderDateOptions();
        return;
      }
      currentDate = nextDate;
      reports = nextReports;
      render();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-copy-stock]");
      if (!trigger) return;
      event.preventDefault();
      await copyStockCode(trigger.getAttribute("data-copy-stock"));
    });

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-stock-history]");
      if (!trigger) return;
      event.preventDefault();
      renderHistoryForStockCompact(trigger.getAttribute("data-stock-history"));
    });

    document.getElementById("search-button").addEventListener("click", () => {
      runStockSearch();
    });

    document.getElementById("stock-search").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      runStockSearch();
    });

    render();
    renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
  </script>
</body>
