인 리테일러 입점이 확대되며 메인스트림 시장으로의 진입을 가속화하고 있고, 유럽에서도 온·오프라인 채널 모두에서 K뷰티가 빠르게 침투 중이다. 다만 일부 외생 변수와 경쟁 심화가 있어 기업별 실적과 주가 흐름에 차별화 양상이 나타나고 있다. 올해 하반기에도 미국과 유럽을 중심으로 수출 호조가 지속될 전망이며, 오프라인 시장의 확장이 K뷰티의 핵심 성장 동력으로 작용할 것으로 기대된다.", "key_points": ["2026년 상반기 화장품 업종 수출 모멘텀 강세, 수출 성장률 4월 누적 기준 +31% (중국 제외), 전년 동기 대비 상승", "미국과 유럽 시장이 수출 성장에 크게 기여하며, K뷰티가 미국 뷰티 시장에서 니치 마켓에서 메인스트림으로 편입됨", "미국에서 아마존 채널 점유율 안정적 유지, 오프라인 리테일 채널 진출 본격화 중, 얼타 및 세포라 등 주요 스페셜티 리테일러가 K뷰티 제품 확대 입점", "유럽은 온라인과 오프라인 채널 모두에서 K뷰티 침투율 증가, 여러 브랜드가 현지 드럭스토어 및 스페셜티 스토어에 입점 예정", "올해 하반기에도 미국과 유럽에서 화장품 수출 성장이 지속될 것으로 전망됨", "주가 차별화 현상 발생, 에이피알과 한국콜마는 주가 상승세, 코스맥스와 실리콘투는 부진", "외생 변수(이란 전쟁으로 용기 가격 상승, 운반비 증가)와 색조 화장품 수출 감소, 올리브영의 해외 유통사업 영향으로 일부 기업 실적과 주가 차별화 초래", "미국 오프라인 시장 침투 확대로 K뷰티 성장 동력 강화 전망"], "risks": ["용기 가격 및 운반비 상승으로 인한 실적 불확실성 증가", "색조 화장품 수출 감소 영향", "올리브영 해외 유통사업 확장으로 인한 경쟁 심화"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/649750.pdf", "json_path": "../reports_json/산업/649750.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649750"}, {"report_idx": "649748", "category": "산업", "published_at": "2026-05-28", "title": "다시 지갑이 열린다", "author": "형권훈", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "의류 및 패션 산업", "market_topic": "내수 소비 및 중국 소비 회복", "investment_opinion": null, "target_price": null, "summary": "2026년 상반기 의류 및 패션 산업은 내수 소비와 중국 소비 회복이 주요 모멘텀으로 작용했다. K자형 소비 양상은 프리미엄과 럭셔리 세그먼트의 강한 성장으로 나타나며, 신세계인터내셔날과 한섬 같은 백화점 중심 해외 브랜드 유통사가 매스 브랜드 대비 강한 실적 상승세를 보이고 있다. 중국 시장에서는 F&F와 들의 저조한 기술이전 성과와 후기 임상 실패, 기업 신뢰도 하락 등이 섹터 전체의 불확실성 확대를 야기했다. 그러나 신약의 FDA 승인과 임상 연구 결과, M&A 및 기술이전 확대 등 기술적 성과가 가시화됨에 따라 하반기에는 반등 가능성이 기대된다. 중요 학회 이벤트와 함께 국내 기업들의 긍정적 임상 발표가 투자심리 회복에 긍정적으로 작용할 것으로 보인다. 미국 FDA 인사 이동에 따른 정책 불확실성도 있지만 급격한 변화 가능성은 제한적이며 규제 일관성 개선 기대도 있다. 전체적으로는 기술 혁신과 AI 등 효율성 개선에 따른 구조적 호재가 상존하여 제약/바이오 섹터의 향후 모멘텀에 긍정적인 영향을 미칠 전망이다.", "key_points": ["상반기 제약/바이오 섹터는 미국 정책 불확실성, 지정학적 리스크, 인플레이션 우려 및 금리 인하 기대감 약화로 인한 시장 소외 현상을 경험함", "제약/바이오 섹터 변동성은 글로벌 혁신 신약 FDA 승인 및 초기·임상 연구 결과 등 기술적 성과에 크게 영향을 받음", "금리 및 M&A, 기술이전을 통한 자본 유입이 신약개발 특성상 중요한 변수로 작용하며, M&A가 주요 Exit 경로로 섹터 투자심리 회복에 기여함", "국내 제약/바이오 기업은 저조한 기술이전 성과, 후기 임상 실패, 기업 신뢰도 하락, 빅파마향 기술이전 파이프라인 가시화 지연으로 섹터 불확실성 확대분위기 속에 있음", "약가 인하 압박(IRA, TrumpRx 등)과 블록버스터 특허 만료에 따른 수익성 우려 존재", "하반기에는 유럽간학회(EASL), 미국임상종양학회(ASCO), 미국당뇨병학회(ADA) 등 주요 학회 이벤트에서 국내기업 임상결과 발표 예정으로 투자심리 회복 기대감 존재", "FDA 인사 불확실성 존재하나 급격한 정책 변화 가능성은 제한적이며, 규제 일관성 개선 기대감 형성 중", "2024~2025년 기술이전 집중과 신규 적응증, 신규 타겟 및 모달리티 성과 가시화 등 기술적 모멘텀 풍부함"], "risks": ["미국 및 글로벌 정책 불확실성 및 지정학적 리스크에 따른 인플레이션 우려", "금리 인하 기대감 약화 및 약가 인하 정책(IRA, TrumpRx)로 인한 수익성 압박", "글로벌 신약 개발 관련 기술이전, 후기 임상 실패 사례 증가 및 기업 신뢰도 하락", "FDA 인사 변동에 따른 신약 승인 정책 불확실성 존재"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/649746.pdf", "json_path": "../reports_json/산업/649746.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649746"}, {"report_idx": "649745", "category": "산업", "published_at": "2026-05-28", "title": "할인율이 사라진다", "author": "최관순", "source": "SK증권", "company_name": null, "stock  인바운드 관광객 추이와 유가 하락에 따른 유류할증료 인하 여부가 주요 관전 포인트이며, 호텔 업계는 객실 공급 한계 및 가격 인상에 따른 소비자 저항을 관리해야 하는 환경에 직면해 있다. 전반적으로 호텔 관련주는 전고점 회복이 가능하나 추가 모멘텀 필요성이 크다.", "key_points": ["2026년 상반기 외국인 인바운드 관광객이 사상 최고치인 701만명을 기록하며 전년 대비 20.8% 증가, 특히 중국, 대만, 홍콩 등 중화권과 일본에서 회복세 뚜렷", "주요 도시 호텔 객실 예약률 80% 중후반으로 사실상 만실 수준 유지", "아웃바운드 관광객 증가 둔화, 4월까지 내국인 해외 출국 증가율 6.7%에 그침, 중동 전쟁, 유가 상승, 고유류할증료(33단계) 등으로 소비심리 위축", "단거리 여행 수요는 견조, 일본과 중국행 출국은 각각 21.9%, 23.6% 증가", "카지노 실적은 인바운드 관광객 증가와 일치하지 않음. K-문화 체험과 가성비 소비 성향 변화 영향으로 도심형 카지노 드롭액 상승 제한적", "제주도는 외국인 관광객 증가와 카지노 매출 증가가 비교적 직접 연결되는 차별적 흐름 관측", "호텔 업황은 객실 예약률이 한계에 다다라 객실 단가 상승 국면으로 변곡점 진입, 무리한 가격인상은 소비자 저항 가능성 존재", "2026년 하반기는 인바운드 관광객 동향과 유가 하락에 따른 유류할증료 인하가 중요 관전 포인트", "중동 전쟁 영향으로 단거리 여행은 지속, 장거리 여행은 제약 가능성, 동아시아권에서의 우리나라 여행객 증가 기대 가능", "4성/5성급 호텔의 단기간 객실 공급 확충은 어려움, 3성급 및 공유 숙박이 빠르게 성장 중"], "risks": ["중동 전쟁 및 정세 불안이 장거리 여행 수요에 악영향 가능성", "고유류할증료 최고단계 적용으로 아웃바운드 관광심리 위축 위험", "호텔 객실 공급의 한계로 수요 증가에도 한계점 도달 가능성", "카지노 실적이 인바운드 증가와 비례하지 않아 카지노 산업 모멘텀 제한적"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/649737.pdf", "json_path": "../reports_json/산업/649737.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649737"}, {"report_idx": "649735", "category": "산업", "published_at": "2026-05-28", "title": "거제 야호", "author": "이지니", "source": "대신증권", "company_name": null, "stock_code": null, "industry_name": "조선업", "market_topic": "한국형 핵추진 잠수함 사업(K-SSN, 장보고 N사업) 추진", "investment_opinion": null, "target_price": null, "summary": "한국 조선산업은 국가 안보 강화와 자주국방 확립  "summary": "본 산업 리포트는 반도체 소재·부품·장비(소부장) 산업의 증설 동향과 미래 수요 전망을 중심으로 분석하였다. 전통 CSP들의 대규모 CAPEX 확대가 지속되고 있으며, AI와 HPC 수요의 증대로 반도체 메모리 및 선단 공정 장비의 증설 필요성이 커지고 있다. 2027년부터 클린룸 부족 문제 완화에 따라 증설이 본격화되고, TSMC의 선단 공정 CAPA 부족 문제도 후공정 패키징 등 다른 분야로 파급되고 있다. 전공정 장비가 업계 내 투자 우선순위로 대두되었으며, 2026~2027년 소부장 업종 실적 전망은 상향 조정 중이다. 다만 클린룸 공간 제약과 일부 공정 수율 문제는 증설 확대의 주요 리스크로 작용할 수 있다.", "key_points": ["전통 CSP 들의 CAPEX 증가율은 60-80%로 매우 높으며, 2025-26년 매출성장률은 15% 내외에 머무름", "AI 내 새로운 메모리 수요가 지속적으로 증가하고 있어 메모리사의 증설 부담이 과거에 비해 낮음", "2027년부터 클린룸 공간 부족 문제가 점차 해소되어 메모리 증설 본격화, 2028년 말까지 이어질 전망", "TSMC 선단 공정 CAPA 부족 심각, AI 수요 급증으로 후공정의 CoWoS, SoIC 등 패키징 증설 가속화", "2026년 1분기 소부장 실적 견조하며, 2027년 실적에 대한 기대감 커지고 있음", "소부장 내 전공정 장비가 투자 우선순위로 꼽히며, 2분기와 3분기 실적 기대감 상승 중", "2026년 상반기에는 세부 업종별 순환매 나타나고 DRAM, NAND 투자 모멘텀에 따른 주가 변동 발생"], "risks": ["클린룸 공간 부족 및 선단 공정 수율 문제로 인한 CAPA 확대 제약 가능성", "TSMC 및 CSP들의 증설 부담과 공급망 이슈 등 대내외 변수 존재"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/649730.pdf", "json_path": "../reports_json/산업/649730.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649730"}, {"report_idx": "649729", "category": "산업", "published_at": "2026-05-28", "title": "증권의 한계를 그은 건 어쩌면 나일지도?", "author": "장영임", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "증권업", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "2024년 1분기 증권업종은 증시 강세와 일평균 거래대금의 급증으로 역대 최대 실적을 기록했다. 2분기에도 거래대금 및 브로커리지 지표가 견조하며, 하반기에도 증시 강세가 지속될 전망이다. 주요 개선 요인은 브로커리지 및 자산관리 수수료수       const range = Math.max(maxValue - minValue, 1);
      const points = values.map((value, index) => {
        const x = padding + ((width - padding * 2) * index) / (values.length - 1);
        const y = height - padding - ((value - minValue) / range) * (height - padding * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const lastPoint = points[points.length - 1].split(",");
      const trendUp = values[values.length - 1] >= values[0];
      const stroke = trendUp ? "#0d7a5f" : "#ca6702";
      return `
        <div class="price-chart" aria-label="최근 3개월 주가 추이">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-hidden="true">
            <polyline fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${points.join(" ")}"></polyline>
            <circle cx="${lastPoint[0]}" cy="${lastPoint[1]}" r="2.8" fill="${stroke}"></circle>
          </svg>
        </div>
        <div class="price-caption">[3개월 주가 추이]</div>
      `;
    }

    async function copyStockCode(stockCode) {
      if (!stockCode) return;
      try {
        await navigator.clipboard.writeText(String(stockCode));
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = String(stockCode);
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
      alert(`종목코드 복사: ${stockCode}`);

    async function fetchReportsForDate(date) {
      if (!date) return [];
      if (reportCache.has(date)) return reportCache.get(date) || [];
      try {
        const response = await fetch(`./archive/${date}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextReports = payload.reports || [];
        reportCache.set(date, nextReports);
        return nextReports;
      } catch (error) {
        return null;
      }
    }

    async function ensureHistoryLoaded() {
      if (historyLoaded) return true;
      for (const date of availableDates) {
        const loaded = await fetchReportsForDate(date);
        if (loaded === null) return false;
      }
      historyLoaded = true;
      return true;
    }

    function allCachedReports() {
      return Array.from(reportCache.values()).flat();
    }

    function stockCatalog() {
      const grouped = new Map();
      for (const item of allCachedReports()) {
        if (item.category !== "기업" || !item.stock_code) continue;
        const key = item.stock_code;
        if (!grouped.has(key)) {
          grouped.set(key, {
            stock_code: item.stock_code,
            company_name: item.company_name || item.title || item.stock_code,
            report_count: 0,
            dates: new Set(),
            latest_date: item.published_at || "",
          });
        }
        const stock = grouped.get(key);
        stock.report_count += 1;
        if (item.company_name) stock.company_name = item.company_name;
        if (item.published_at) stock.dates.add(item.published_at);
        if ((item.published_at || "") > stock.latest_date) stock.latest_date = item.published_at || "";
      }
      return Array.from(grouped.values());
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }
