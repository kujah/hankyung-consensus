: "최근 글로벌 및 국내 증시는 높은 물가 수준과 중동 군사적 충돌 등 지정학적 긴장 고조로 인해 위험 회피 심리가 확대되어 전반적으로 하락세를 보였다. 미국과 유럽을 비롯한 주요국 증시는 금리와 물가지수 발표 후 변동성을 높였으며, 코스피는 매도 사이드카 발동 등으로 급락했다. 수급 측면에서는 외국인과 기관, 연기금 등 주요 투자자들의 매매 강도가 업종별로 갈리면서 시장 내 양극화를 유발하고 있다. 특히 반도체 및 IT업종이 약세를 주도한 반면 일부 방어적 섹터는 선별적 강세를 나타냈다. 이러한 시장 환경은 물가 및 금리 불확실성과 지정학적 리스크에 따른 변동성 확대 우려를 내포하고 있다.", "key_points": ["최근 글로벌 주요국 증시는 높은 물가지수 및 지정학적 긴장에 따른 군사 충돌 우려로 하락 마감", "미국, 유럽, 아시아 주요 증시 모두 약세를 보이며, 반도체 및 IT 관련주 약세가 두드러짐", "코스피는 오후 매도 사이드카 발동으로 변동성 확대, 코스닥은 선별적 매수세 유지", "미국 생산자물가지수 전망 부합이나 실업수당청구건수 발표로 긴축 경계감 지속", "금리 시장에서는 미국과 유럽 국채 수익률 변동성이 관찰되며, 주요 원자재 가격은 혼조세(금, 유가 등)", "외국인, 기관, 연기금의 매수·매도 강도가 업종 및 종목별로 상이하게 나타나며 수급 양상 복합적", "국내 주요 섹터별 수익률은 IT와 소재 업종 중심으로 부진, 화장품, 필수소비재 등 일부 방어적 섹터 상대적 강세", "글로벌 주식시장의 불확실성 속 시장 전체적으로 변동성 확대 및 투자심리 위축"], "risks": ["고물가지수 지속과 전쟁 장기화에 따른 지정학적 리스크 상존", "국제 긴축 정책 강화에 따른 금융시장 변동성 확대 가능성", "주요국 간 긴장 고조가 투자심리 악화로 이어질 위험", "반도체 및 IT 업종의 지속적 약세가 시장 전반에 부담 요소"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/649998.pdf", "json_path": "../reports_json/시장/649998.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649998"}, {"report_idx": "649980", "category": "시장", "published_at": "2026-06-11", "title": "morning meeting brief", "author": "리서치센터", "source": "대신증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "미국 CPI 상승과 연준 인내, 중동 지정학 리스크, 글로벌 및 한국 증시 변동성 확대 및 외국인 매도 지속", "investment_opinion": null, "target_price": null, "summary": "미국 5월 물가 지표는 헤드라인 상승과 함께 Core CPI 상승률이 시장 예상을 다소 하회하며, 연준이 금리 인상을 당분간 유보하고 인내할 여건을 제공하였다. 그러나 중동 지역 지정학적 불안과 국제 유가 상승, 연이은 협상 지연으로 투자심리가 약화되어 변동성 확대 및 매도 사이드카 발동 사례가 발생하였다. AI 관련 기술주 조정과 반도체 업종 차익 실현 압력이 증시에 부정적 영향을 미쳤으며, 외국인 매도세가 69조원에 이르러 한국 특유의 변동성 지표인 VKOSPI-VIX 스프레드가 급격히 상승하는 등의 현상이 나타났다. 반도체 대형주 중심의 쏠림 현상과 변동성 증가는 단기적 자산배분 조정 및 수급 악화를 야기하고 있다. 중장기 안정적 수급 회복은 반도체 업종 변동성 안정화와 기타 업종의 이익 개선이 선행되어야 가능할 것으로 전망된다.", "key_points": ["미국 5월 CPI 상승하였으나 Core CPI 상승률은 시장 예상치 하회, 상품 물가 하락 반전으로 연준의 금리 인상 유보 및 인내 가능성 전망", "중동 지정학적 리스크 증가로 국제 유가 상승, 투자심리 위축되며 매도 사이드카 발동", "AI 랠리 제동과 반도체 업종 차익실현 확대, 미국 및 국내 기술주 약세 전개", "위험자산 회피 심리 속 방산·조선 업종으로 순환매 진행", "5월 7일 이후 외국인 순매도 69조원으로 추정 상한을 크게 초과하며 증시 변동성 확대", "한국 고유 변동성(VKOSPI-VIX 스프레드) 폭증과 반도체 대형주 동조화가 매도 및 변동성 확대 주요 배경"], "risks": ["중동 지역 불확실성 장기화 및 협상 타결 실패 가능성", "미국 인플레이션 상승 지속 시 연준 긴축 재개 우려", "증시 변동성 급증과 외국인 대규모 매도로 투자심리 악화 가능성", "반도체 대형주에 대한 과도한 쏠림과 이에 따른 변동성 리스크"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/649980.pdf", "json_path": "../reports_json/시장/649980.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649980"}, {"report_idx": "649975", "category": "시장", "published_at": "2026-06-11", "title": "5월 미국 CPI: 유가 부담 지속", "author": "최규호", "source": "한화투자증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "5월 미국 소비자물가(CPI) 상승 지속 및 유가 부담", "investment_opinion": null, "target_price": null, "summary": "5월 미국 소비자물가는 전년동월대비 4.2% 상승하며 4%대에 진입했다. 전반적인 상승에는 유가 등 에너지 가격 상승이 큰 영향을 미쳤고, 서비스 물가는 임대료 상승세는 완만해졌으나 항공료 및 통신서비스 등은 여전히  수준 유지", "에너지 가격, 특히 휘발유 가격의 상승이 물가 상승을 주도하고 있음", "서비스 물가 상승 압력은 완만한 둔화세이나 여전히 하방경직성 존재", "고유가 영향이 단기간에 해소되기 어려워 물가가 3% 이상 지속될 가능성 큼", "소비자심리 회복은 지연 중이지만 소매판매는 비교적 양호한 흐름 유지 중", "연말까지 국제유가가 서서히 하락하더라도 물가에 미치는 영향은 장기간 지속될 전망"], "risks": ["지정학적 리스크 완화 속도 둔화에 따른 국제유가 변동성 및 물가 상승 지속 위험", "서비스 물가의 하방경직성으로 인한 인플레이션 지속 위험", "소비심리 회복 지연으로 인한 경기 둔화 가능성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/시장/649974.pdf", "json_path": "../reports_json/시장/649974.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649974"}, {"report_idx": "649972", "category": "시장", "published_at": "2026-06-11", "title": "신흥국 실적 상향 상위 종목에 한국 종목 부재", "author": "안현국", "source": "한화투자증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "신흥국 및 선진국 주식시장 EPS 변화 동향 분석", "investment_opinion": null, "target_price": null, "summary": "최근 신흥국과 선진국 주식시장을 대상으로 한 12개월 예상 EPS 변화 분석 결과, 신흥국 상위 EPS 성장 종목에 한국 주식이 제외되고, 한국 주요 대형주들이 신흥국 EPS 하향 종목으로 나타났다. 선진국에서는 반도체 및 에너지 업종 중심으로 상향 조정이 진행되는 가운데 한국 시장은 상대적으로 EPS 개선 세가 제한적이다. 한국 MSCI KOREA 지수의 EPS 성장률과 저평가된 PER은 긍정적이지만, 신흥국 내 한국 종목들의 수급 부담과 일부 대형주의 이익 모멘텀 둔화가 관찰되어 전략적인 접근이 필요하다. 투자자들은 글로벌 에너지 및 산업재 섹터 중심의 이익 개선 흐름을 주목하고, 한국 종목별 성장성 및 실적 예상치 변동을 면밀히 모니터링해야 할 시점이다.", "key_points": ["신흥국 종목 EPS 상향 상위에 한국 종목은 없으며, 하위권에는 한국 주요 대형주들이 포함됨 (예: 삼성전기, NAVER, KB금융, 삼성SDI, 신한지주, LG에너지솔루션)", "선진국 시장에서는 브로드컴, 마이크론 등이 EPS 상향 상위에 진입, 소프트뱅크, 버크셔해서웨이, ASML 등이 하향세임", "글로벌 시장에서 한국 증시 EPS는 1%대 상승하며 상대적으로 양호한 편, 특히 에너지와 산업재 섹터 실적 상향이 두드러짐", "미국, 일본, 영국 등 선진국 "investment_opinion": null, "target_price": null, "summary": "최근 보고서에 따르면 광통신 산업 내 차세대 기술인 CPO 양산 시점이 기존 예상보다 지연될 가능성이 커지면서, 구리 및 플러그형 광모듈이 단기 우위를 점할 전망이다. 이는 CPO의 낮은 수율과 높은 비용 부담에서 기인하며, 시장에서 과도하게 기대했던 CPO 도입 속도가 조정받는 중이다. 그러나 광통신 수요 자체는 여전히 견고하며, 이번 조정은 기술 도입 속도에 대한 기대치 변화가 핵심이다. 국내 주요 광통신 기업들의 실적에는 큰 영향이 없으며, 병목 공정 관련 장비 업체들은 오히려 가치 재평가 가능성이 존재한다. 단기 조정에도 펀더멘털은 견조해 중장기적 투자 심리 회복 가능성은 충분하다.", "key_points": ["2029년 이후로 예상되는 CPO 양산 지연으로 인해 당분간 구리 및 플러그형 광모듈이 우세할 전망", "CPO 시스템의 낮은 수율과 높은 비용이 시장 기대 과열을 꺾는 요인으로 작용", "광통신 수요 근본 방향성은 훼손되지 않았으며, 이슈는 CPO 도입 타임라인에 집중됨", "국내 광통신 종목 주가는 글로벌 CPO 기대감 조정에 따라 민감하게 반응하나 실적 영향은 제한적", "CPO 양산의 병목은 소재·부품뿐 아니라 패키징, 광정렬, 테스트 등 공정에도 존재하여 관련 장비 업체의 가치 재평가 가능성 존재", "일시적 조정은 있지만 펀더멘털 악화는 크지 않아 중장기적으로 투자 심리 회복 여지 있음", "CPO 대량 양산 지연에 따른 대표업체인 성호전자 등에 대한 영향은 제한적이며, 일부 업체는 관련 시장과 거리가 있음"], "risks": ["CPO 수율 안정화 지연에 따른 도입 시기 추가 지연 가능성", "시장 기대 조정으로 인한 단기 밸류에이션 변동성 확대", "광통신 시장 내 일부 공정 병목 문제로 인한 공급 불확실성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/649990.pdf", "json_path": "../reports_json/산업/649990.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649990"}, {"report_idx": "649988", "category": "산업", "published_at": "2026-06-11", "title": "안녕하세요 데일리에요", "author": "양승윤", "source": "유진투자증권", "company_name": null, "stock_code": null, "industry_name": "로봇, 방산, 조선", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "본 산업 리포트는 로봇, 방산, 조선 세 분야의 주요 이슈와 동향을 종합적으로 소개한다. 로봇산업에서는 국내외 기업들의 기술 개발과 투자 확대가 돋보이며, 방산 분야     function formatWon(value) {
      if (!Number.isFinite(value)) return "";
      return `${Math.round(value).toLocaleString("ko-KR")}원`;
    }

    function formatPercent(value) {
      if (!Number.isFinite(value)) return "";
      return `${value.toFixed(1)}%`;
    }

    function getUpsideData(item) {
      const livePrice = parsePriceValue(item.live_price);
      const targetPrice = parsePriceValue(item.target_price);
      if (!Number.isFinite(livePrice) || !Number.isFinite(targetPrice) || livePrice <= 0) {
        return null;
      }
      const diff = targetPrice - livePrice;
      return {
        diff,
        pct: (diff / livePrice) * 100,
      };
    }

    function upsideLabel(item) {
      const upside = getUpsideData(item);
      if (!upside) return "";
      return `현재가 기준 상승여력 ${formatWon(upside.diff)} (${formatPercent(upside.pct)})`;
    }

    function filteredReports() {
      return current === "전체"
        ? reports
        : reports.filter((item) => item.category === current);
    }

    function countByCategory(items) {
      const counts = {};
      for (const item of items) counts[item.category] = (counts[item.category] || 0) + 1;
      return counts;
    }

    function groupedData(items) {
      const groups = new Map();
      const industry = [];
      const market = [];

      for (const item of items) {
        if (item.category === "기업" && item.stock_code) {
          const key = item.stock_code;
          if (!groups.has(key)) {
            groups.set(key, {
              stock_code: item.stock_code,
              company_name: item.company_name || item.title,
              live_price: item.live_price,
              live_price_change: item.live_price_change,
              live_price_rate: item.live_price_rate,
              live_price_as_of: item.live_price_as_of,
              live_price_high_52w: item.live_price_high_52w,
              price_history: item.price_history || [],
              best_alpha_score: item.alpha_score,
              best_alpha_grade: item.alpha_grade,
              reports: [],
            });
          }
          const group = groups.get(key);
          if ((!group.price_history || !group.price_history.length) && item.price_history?.length) {
            group.price_history = item.price_history;
          }
          if ((item.alpha_score || -1) > (group.best_alpha_score || -1)) {
            group.best_alpha_score = item.alpha_score;
            group.best_alpha_grade = item.alpha_grade;
          }
          group.reports.push(item);
        } else if (item.category === "산업") {
          industry.push(item);
        } else {
          market.push(item);
        }
      }

      const groupedCompanies = Array.from(groups.values())
        .map((group) => ({
          ...group,
          reports: group.reports.sort((a, b) => {
            const scoreDiff = (b.alpha_score || -1) - (a.alpha_score || -1);
            if (scoreDiff !== 0) return scoreDiff;
            const sourceA = a.source || "";
            const sourceB = b.source || "";
            return sourceA.localeCompare(sourceB, "ko");
          }),
        }))
        .sort((a, b) => {
          const scoreDiff = (b.best_alpha_score || -1) - (a.best_alpha_score || -1);
          if (scoreDiff !== 0) return scoreDiff;
          const countDiff = b.reports.length - a.reports.length;
          if (countDiff !== 0) return countDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });

      return { groupedCompanies, industry, market };
    }

    function formatQuoteAsOf(value) {
      const text = safe(value);
      const matched = text.match(/(\d{4}\.\d{2}\.\d{2})/);
      if (matched) return `${matched[1].slice(2)} 장마감 기준`;
      return text
        .replace(/^현재가\s*/, "")
        .replace(/\s*기준(?:\(KRX 장마감\)|\(장마감\)|\(KRX장마감\)|\(KRX 마감\))?/g, "")
        .trim();
    }

    function priceDirectionClass(group) {
      const explicit = safe(group.live_price_direction).toLowerCase();
      if (explicit === "up" || explicit === "rise") return "up";
      if (explicit === "down" || explicit === "fall") return "down";

      const changeAmount = parsePriceValue(group.live_price_change);
      const changeRate = parsePriceValue(group.live_price_rate);
      if (Number.isFinite(changeAmount) && changeAmount < 0) return "down";
      if (Number.isFinite(changeRate) && changeRate < 0) return "down";
      if (Number.isFinite(changeAmount) && changeAmount > 0) return "up";
      if (Number.isFinite(changeRate) && changeRate > 0) return "up";

      const text = `${safe(group.live_price_change)} ${safe(group.live_price_rate)}`;
      if (text.includes("-")) return "down";
      return "";
    }

    function renderSparkline(history) {
      const values = (history || [])
        .map((item) => parsePriceValue(item.close))
        .filter((value) => Number.isFinite(value));
      if (values.length < 2) return "";

      const width = 220;
      const height = 40;
      const padding = 2;
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const range = Math.max(maxValue - minValue, 1);
      const points = values.map((value, index) => {
        const x = padding + ((width - padding * 2) * index) / (values.length - 1);
        const y = height - padding - ((value - minValue) / range) * (height - padding * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const lastPoint = points[points.length - 1].split(",");
      const trendUp = values[values.length - 1] >= values[0];
      const stroke = trendUp ? "#0d7a5f" : "#ca6702";
      return `
        <div class="price-chart" aria-label="최근 3개월 주가 추이">
          <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-hidden="true">
            <polyline fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${points.join(" ")}"></polyline>
            <circle cx="${lastPoint[0]}" cy="${lastPoint[1]}" r="2.8" fill="${stroke}"></circle>
          </svg>
        </div>
        <div class="price-caption">[3개월 주가 추이]</div>
      `;
    }

    function renderPriceBox(group) {
      if (!group.live_price) {

          </div>
        `;
      }

      const change = [safe(group.live_price_change), safe(group.live_price_rate)].filter(Boolean).join(" / ");
      const directionClass = priceDirectionClass(group);
      const high52w = safe(group.live_price_high_52w);
      return `
        <div class="price-box">

    function stockWebUrl(stockCode) {
      if (!stockCode) return "";
      return `https://finance.naver.com/item/main.naver?code=${encodeURIComponent(stockCode)}`;
    }

    async function copyStockCode(stockCode) {
      if (!stockCode) return;
      try {
        await navigator.clipboard.writeText(String(stockCode));
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = String(stockCode);
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
      alert(`종목코드 복사: ${stockCode}`);
    }

    async function fetchReportsForDate(date) {
      if (!date) return [];
      if (reportCache.has(date)) return reportCache.get(date) || [];
      try {
        const response = await fetch(`./archive/${date}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextReports = payload.reports || [];
        reportCache.set(date, nextReports);
        return nextReports;
      } catch (error) {
        return null;
      }
    }

    async function ensureHistoryLoaded() {
      if (historyLoaded) return true;
      for (const date of availableDates) {
        const loaded = await fetchReportsForDate(date);
        if (loaded === null) return false;
      }
      historyLoaded = true;
      return true;
    }

    function allCachedReports() {
      return Array.from(reportCache.values()).flat();
    }

    function stockCatalog() {
      const grouped = new Map();
      for (const item of allCachedReports()) {
        if (item.category !== "기업" || !item.stock_code) continue;
        const key = item.stock_code;
        if (!grouped.has(key)) {
          grouped.set(key, {
            stock_code: item.stock_code,
            company_name: item.company_name || item.title || item.stock_code,
            report_count: 0,
            dates: new Set(),
            latest_date: item.published_at || "",
          });
        }
        const stock = grouped.get(key);
        stock.report_count += 1;
        if (item.company_name) stock.company_name = item.company_name;
        if (item.published_at) stock.dates.add(item.published_at);
        if ((item.published_at || "") > stock.latest_date) stock.latest_date = item.published_at || "";
      }
      return Array.from(grouped.values());
    }

    function renderSearchResults(htmlText) {
      document.getElementById("search-results").innerHTML = htmlText;

    function renderHistoryEmpty(message) {
      const root = document.getElementById("history-section");
      root.innerHTML = `<div class="history-empty">${safe(message)}</div>`;
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }

    async function runStockSearch() {
      const input = document.getElementById("stock-search");
      const query = String(input.value || "").trim();
      if (!query) {

          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.category)}</span>
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            ${renderAlphaBox(item)}
            <p class="summary">${safe(item.summary)}</p>
            ${points ? `<ul class="points">${points}</ul>` : ""}
            ${renderFactorSections(item)}
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      renderModes();
      renderDateOptions();
      renderFilters();
      const items = filteredReports();
      renderStats(items);
      if (currentMode === "grouped") {
        renderGrouped(items);
      } else {
        renderList(items);
      }
    }

    async function switchDate(nextDate) {
      if (!nextDate || nextDate === currentDate) return;
      const nextReports = await fetchReportsForDate(nextDate);
      if (nextReports === null) {
        alert(`브리프를 불러오지 못했습니다: ${nextDate}`);
        renderDateOptions();
        return;
      }
      currentDate = nextDate;
      reports = nextReports;
      render();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-copy-stock]");
      if (!trigger) return;
      event.preventDefault();
      await copyStockCode(trigger.getAttribute("data-copy-stock"));
    });

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-stock-history]");
      if (!trigger) return;
      event.preventDefault();
      renderHistoryForStockCompact(trigger.getAttribute("data-stock-history"));
    });

    document.getElementById("search-button").addEventListener("click", () => {
      runStockSearch();
    });

    document.getElementById("stock-search").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      runStockSearch();
    });

    render();
    renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
  </script>
</body>
</html>
