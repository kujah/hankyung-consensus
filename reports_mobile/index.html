 및 AI 칩", "market_topic": "온디바이스 AI 확산과 메모리 병목 현상", "investment_opinion": null, "target_price": null, "summary": "본 보고서는 2026년 반도체 메모리 시장과 온디바이스 AI 확산 동향을 분석했다. 애플과 구글 등 글로벌 IT 기업들이 AI 모델 내장에 나서고 있으나 메모리 공급 부족과 가격 상승이 도전 요인이다. 삼성전자의 첨단 파운드리 수주 기대가 긍정적인 변수이며, 산업 전반에서 AI 수요 확대에 따른 반도체 공급과 투자 확대가 필요하다. 메모리 스팟 가격과 프리미엄이 크게 상승하는 가운데, 병목 현상 해소와 소재·장비 기술이 중요해지고 있다. 향후 반도체 및 부품 소재기업 주가 변동성 확대 가능성이 존재하나, 글로벌 공급 안정화 및 투자 증가가 산업 성장을 견인할 전망이다.", "key_points": ["2026년 현재 DRAM 및 NAND 메모리 가격은 상승세를 보이며 수요 강세가 지속되고 있음", "애플, 구글 등 주요 IT기업들이 온디바이스 AI 기술 개발 및 적용을 강화 중이나, 메모리 공급 부족과 비용 상승이 확산의 제약 요인으로 작용", "삼성전자는 구글 TPU 차세대 반도체 파운드리 생산 관련 사업 수주 가능성이 있어 2nm 공정과 고성능 패키징 기술이 파운드리 경쟁력 강화로 이어질 전망", "반도체 업계 전반에서 AI 및 데이터센터 수요 증가로 투자확대가 불가피하며, 병목 현상 해소와 기술 경쟁이 핵심 과제로 부상", "메모리 현물 가격 상승과 스팟 프리미엄 확대가 지속 중이며, 글로벌 주요 반도체 기업들과 장비, 소재 업체들의 주가 변동성이 확대됨"], "risks": ["메모리 공급 병목과 가격 상승이 온디바이스 AI 확산 속도에 제약으로 작용할 위험", "대규모 AI 인프라 투자에 따른 일부 기업의 재무 부담 증가 가능성", "글로벌 반도체 공급망 불안정과 지정학적 리스크가 산업 전반에 부정적 영향 초래할 위험"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650068.pdf", "json_path": "../reports_json/산업/650068.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650068"}, {"report_idx": "650067", "category": "산업", "published_at": "2026-06-15", "title": "AI 컴퓨팅 파워 선물이 온다", "author": "황성현", "source": "유진투자증권", "company_name": null, "stock_code": null, "industry_name": "AI 컴퓨팅 파워 및 에너지 산업", "market_topic": "GPU 컴퓨팅 파워 선물 거래 도입 및 에너지 산업 현황", "investment_opinion": null, "target_price": null, "summary": "본 산업 리포트는 AI 컴퓨팅 파워 선물 거래의 공식 출범과 에너지·배터리 산업 최신 동향을 다루고 있다. GPU 임대료 변동에 기반한 선물 거래가 금융시장에 새로운 위험 관리 수단으로 도입되어 AI 산업의 비용 헤지와 예산 관리가 강화될 전망이다. 한편, 한국의 원전 상시검사 정책 변경과 체코의 SMR 건설 추진, 주요 배터리 업체의 특허 분쟁 및 관세 환급 현황 등 에너지와 배터리 산업 내 다양한 정책 및 수급 변화도 함께 소개된다. 전반적으로 컴퓨팅 파워의 금융자산화와 가격 투명성 증대가 데이터센터 투자 활성화와 자금 유입을 촉진할 수 있으나 초기 시장의 불확실성과 대기업 중심의 자원 선점 현상은 위험 요인으로 작용할 수 있다.", "key_points": ["세계 최초로 컴퓨팅 파워(GPU) 선물 거래가 CME와 Silicon Valley Data에서 출시 발표, ICE도 추후 출범 예정", "컴퓨팅 파워 선물은 GPU 임대료 변동에 따른 비용 헤지 및 예산 관리 수단으로 AI 기업과 인프라 업체간 위험 분산 가능", "선물 거래는 현금결제 방식으로 진행되며, GPU 직접 인도 대신 임대 가격 변동에 대한 금융거래로 구성됨", "가격 지표 투명성이 개선되고 컴퓨팅 파워가 금융자산화됨에 따라 빅테크·데이터센터 및 보험사·연기금 자금 유입 가능성 확대", "컴퓨팅 파워 선물은 전력 및 탄소 가격 연동 가능성이 높아 데이터센터의 전력 관련 헤지 수요도 증가할 전망", "시장 초기에는 지수 신뢰성 검증에 시간이 필요하며, 대기업의 비용 선제 고정으로 중소 AI 기업과 자원 격차 우려 존재", "2027년부터 한국 원전 상시검사 전면 도입, 체코는 SMR 3기 건설 추진 중", "LG에너지솔루션이 중국 특허 분쟁에서 승소, 삼성SDI·LG에너지솔루션이 미국 정부에 상호관세 환급 신청", "최근 배터리, 원자력 관련 주요 기업 및 지수 대부분 주간 주가 하락 기록", "글로벌 및 지역별 전기차 판매량 변동, 2차전지 가격 및 원자재 가격 추이 상세 분석"], "risks": ["컴퓨팅 파워 선물 시장 초기 지수 신뢰성 검증기간에 따른 가격 변동성 위험", "대기업과 중소 AI 기업 간 자원 확보 격차 심화 가능성", "선물 시장이 위험 분산과 동시에 위험 증폭 효과를 가질 우려"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650067.pdf", "json_path": "../reports_json/산업/650067.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650067"}, {"report_idx": "650066", "category": "산업", "published_at": "2026-06-15", "title": "테슬라의 성장 전환이 반가운 K배터리", "author": "한병화", "source": "유진투자증권", "company_name": null, "stock_code": null, "industry_name": "-", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "테슬라의 2026년 전기차 판매 회복과 BESS 생산능력 확대가 예상되면서, 이에 연계된 K배터리 산업 전반에 긍정적 영향이 기대된다. 미국과 유럽의 현지화 정책과 중국 배터리 배제 움직임으로 K배터리 밸류체인 경쟁력이 강화되고 있으며, 최근 주가 하락은 주로 수급 이슈에 기인한다. 전반적인 전방 산업 환경과 정책 환경이 유리하게 돌아가면서 K배터리 관련주들은 올해부터 안정적인 이익 성장기로 접어들 것으로 판단된다.", "key_points": ["테슬라의 글로벌 전기차 판매는 2024~2025년 2년간 역성장했으나 2026년 8% 성장으로 회복 예상", "북미는 미국 보조금 폐지로 전기차 판매 역성장 예상이나, 유럽과 기타 국가에서 높은 성장률로 상쇄", "테슬라는 중국, 미국, 아시아 등 주요 국가에서 인센티브 및 파이낸싱 전략과 자율주행 기대감으로 브랜드 로열티 강화 중", "미국 내 BESS 생산 캐파 확대 중으로 2025년 미국 판매량 29.5GWh로 전년 대비 45% 증가, 2026년에도 성장 지속 예상", "테슬라 글로벌 BESS 생산 캐파는 2024년 말 130GWh로 2배 이상 확대 예정, 2027년 이후 성장률 확대 전망", "미국의 중국산 배터리 배제 정책, EU IAA, 핵심원자재법, 배터리 패스포트 등 정책 변화가 테슬라의 공급망 전략에 영향", "K배터리 업체들은 미국과 유럽에 현지화한 밸류체인 완성으로 테슬라향 물량 대폭 증가 기대", "K배터리 관련주 최근 주가 하락은 수급 이슈로, 펀더멘탈과 무관하며 올해부터 이익 성장기 재진입이 확정적"], "risks": ["미국 보조금 폐지로 인해 북미 전기차 판매 부진 가능성", "반도체 시장의 수급 불안정이 K배터리 관련주 주가에 단기 악영향을 줌", "글로벌 정책 변화에 따른 공급망 전략 변경으로 인한 불확실성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650066.pdf", "json_path": "../reports_json/산업/650066.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650066"}, {"report_idx": "650065", "category": "산업", "published_at": "2026-06-15", "title": "안녕하세요 위클리에요", "author": "양승윤", "source": "유진투자증권", "company_name": null, "stock_code": null, "industry_name": "로봇, 방산, 조선, 항공, 해운", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "최근 국내외 로봇, 방산, 조선, 항공, 해운 산업 전반에 걸 tps://consensus.hankyung.com/analysis/downpdf?report_idx=650065"}, {"report_idx": "650064", "category": "산업", "published_at": "2026-06-15", "title": "4~5월 여수신동향 : 2Q 대출증가율 확대 예상", "author": "전배승", "source": "LS증권", "company_name": null, "stock_code": null, "industry_name": "-", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "4~5월 은행권 대출은 기업대출과 가계대출이 동시에 증가하며 2분기 대출 증가율이 1분기 대비 확대되어 약 2% 수준을 기록할 전망입니다. 가계대출은 주택담보대출과 개인의 주식 투자 영향으로 신용대출이 크게 늘어났으며, 수신 측면에서는 기업자금 유치가 증가해 조달 부담은 낮은 상황이 지속되고 있습니다. 이에 따라 2분기 이자이익이 개선될 것으로 예상되며, 하반기 금리 인상 가능성에도 불구하고 은행권 이익 가시성은 높아질 전망입니다. 다만, 개인신용대출 급증과 금융당국의 대출 규제 강화, 금리 인상에 따른 부담 증가는 리스크 요인으로 판단됩니다.", "key_points": ["4~5월 기업대출과 가계대출이 동반 확대되며 2분기 대출증가율이 1분기 대비 상승해 약 2% 예상됨.", "주식투자 확대로 인한 개인신용대출 급증과 주택담보대출 증가가 가계대출 성장에 기여.", "수신 측면에서는 기업자금 유치 증가로 5월에 총수신이 크게 증가, 자금조달 부담이 낮은 상태 유지.", "하반기 금리 인상 가능성에도 불구하고 대출금리 반영과 수신 상황 등으로 이자이익이 개선되어 은행권 탑라인 성장세 지속 전망.", "금융당국은 신용대출 한도관리를 주문하는 등 리스크 관리 강화 시사."], "risks": ["최근 개인의 대규모 주식투자로 인한 신용대출 급증이 신용위험 가능성을 내포.", "하반기 금리인상에 따라 조달비용 증가 리스크 상존.", "증시 변동성 및 금융당국의 신용대출 관리 강화 정책이 수요와 이익에 영향 미칠 가능성."], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650064.pdf", "json_path": "../reports_json/산업/650064.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650064"}, {"report_idx": "650062", "category": "산업", "published_at": "2026-06-15", "title": "도수치료 관리급여 지정 관련", "author": "전배승", "source": "LS증권", "company_name": null, "stock_code": null, "industry_name": "보험", "market_topic": "도수치료 관리급여 지정 관련", "investment_opinion": null, "target_price": null, "summary": "2026년 7월부터 도수치료가 관리급여로 지정되어 보험수가가 크게 하락하고 급여기준이 설정됨에 따라 손보사들의 도수치료 관련 보험금 지급 부담이 연간 약 500~1,000억원 수준으로 크게 감소할 전망이다. 도수치료는 근골격계 질환 실손보험금 지급에서 가장 큰 비중을 차지하는 비급여 항목으로, 관리급여 전환은 손보사들의 실손보험 수익성 개선에 긍정적 영향을 줄 것으로 예상된다. 그러나 도수치료 급여화에 따른 의료남용 개선과 함께 비급여 주사나 체외충격파 등 다른 비급여 항목에서의 풍선효과 발생 여부는 지속적인 모니터링이 필요하며, 이로 인한 보험금 증가 위험이 존재한다. 향후 관리급여 대상 항목 확대 가능성도 산업 내 주요 변수이다.", "key_points": ["도수치료 비급여 항목이 2026년 7월부터 관리급여로 전환되어 수가가 하락하고 급여기준이 설정됨(수가: 43,850원, 본인부담률 95%, 주 2회 연 15회 기준).", "도수치료는 근골격계 질환 실손보험금 중 약 1.5조원 규모로 가장 큰 비급여 단일 항목이며, 관리급여 전환으로 손보사 보험금 지급 부담이 큰 폭으로 줄어들 전망.", "현재 손보사들이 도수치료 청구액은 연간 약 1,500억원 수준이나 관리급여 편입으로 회사별 연간 보험금 감소는 약 500~1,000억원에 달할 것으로 추산됨.", "관리급여 도입으로 실제 도수치료 의료 공급과 과잉진료 빈도도 감소할 것으로 보이며, 이는 손보사 손익에 긍정적 효과를 주는 것으로 예상됨.", "특히 실손보험 비중이 크고 손해율이 높은 2위권 손보사(현대해상, DB손보)의 수혜가 클 전망.", "도수치료 급여화에 따라 의료남용은 개선되나, 비급여 비슷한 분야(비급여 주사, 체외충격파 등)에서의 풍선효과 발생 여부가 관건임.", "비급여 주사 보험금은 최근 32% 급증하는 등 관리급여 미지정 비급여 항목 증가 우려 존재.", "향후 관리급여 지정이 도수치료 외 다른 비급여 과잉진료 항목으로 확대될 가능성도 있음."], "risks": ["관리급여 전환으로 도수치료 외 다른 비급여 의료항목에서 풍선효과 및 보험금 청구 증가 위험.", "도수치료 의료공급 감소에 따른 의료기관 수익성 악화 가능성.", "비급여 주사, 체외충격파 등 현 비급여 항목의 보험금 급증에 따른 보험사 손익 악화 위험."], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "live_price_high_52w": null, "price_history": [], "pdf_path": "../reports_pdf/산업/650062.pdf", "json_path": "../reports_json/산업/650062.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=650062"}, {"report_idx": "650059", "category": "산업", "published_at": "2026-06-15", "title": "[철강] 매크로 환경 악화 등     function getUpsideData(item) {

      if (!Number.isFinite(livePrice) || !Number.isFinite(targetPrice) || livePrice <= 0) {

      const diff = targetPrice - livePrice;
      return {

        pct: (diff / livePrice) * 100,
      };
    }

    function upsideLabel(item) {

          if (!groups.has(key)) {

      const changeAmount = parsePriceValue(group.live_price_change);
      const changeRate = parsePriceValue(group.live_price_rate);
      if (Number.isFinite(changeAmount) && changeAmount < 0) return "down";
      if (Number.isFinite(changeRate) && changeRate < 0) return "down";
      if (Number.isFinite(changeAmount) && changeAmount > 0) return "up";
      if (Number.isFinite(changeRate) && changeRate > 0) return "up";

      const text = `${safe(group.live_price_change)} ${safe(group.live_price_rate)}`;

    function renderSparkline(history) {
      const values = (history || [])

        .filter((value) => Number.isFinite(value));
      if (values.length < 2) return "";

      const width = 220;
      const height = 40;
      const padding = 2;
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const range = Math.max(maxValue - minValue, 1);
      const points = values.map((value, index) => {
        const x = padding + ((width - padding * 2) * index) / (values.length - 1);
        const y = height - padding - ((value - minValue) / range) * (height - padding * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const lastPoint = points[points.length - 1].split(",");
      const trendUp = values[values.length - 1] >= values[0];
      const stroke = trendUp ? "#0d7a5f" : "#ca6702";
      return `

    }

    async function copyStockCode(stockCode) {
      if (!stockCode) return;
      try {
        await navigator.clipboard.writeText(String(stockCode));
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = String(stockCode);
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }
      alert(`종목코드 복사: ${stockCode}`);
    }

    async function fetchReportsForDate(date) {
      if (!date) return [];
      if (reportCache.has(date)) return reportCache.get(date) || [];
      try {
        const response = await fetch(`./archive/${date}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextReports = payload.reports || [];
        reportCache.set(date, nextReports);
        return nextReports;
      } catch (error) {
        return null;
      }
    }

    async function ensureHistoryLoaded() {
      if (historyLoaded) return true;
      for (const date of availableDates) {
        const loaded = await fetchReportsForDate(date);
        if (loaded === null) return false;
      }
      historyLoaded = true;
      return true;
    }

    function allCachedReports() {
      return Array.from(reportCache.values()).flat();
    }

    function stockCatalog() {
      const grouped = new Map();
      for (const item of allCachedReports()) {
        if (item.category !== "기업" || !item.stock_code) continue;
        const key = item.stock_code;
        if (!grouped.has(key)) {
          grouped.set(key, {
            stock_code: item.stock_code,
            company_name: item.company_name || item.title || item.stock_code,
            report_count: 0,
            dates: new Set(),
            latest_date: item.published_at || "",
          });
        }
        const stock = grouped.get(key);
        stock.report_count += 1;
        if (item.company_name) stock.company_name = item.company_name;
        if (item.published_at) stock.dates.add(item.published_at);
        if ((item.published_at || "") > stock.latest_date) stock.latest_date = item.published_at || "";
      }
      return Array.from(grouped.values());
    }

    function renderSearchResults(htmlText) {
      document.getElementById("search-results").innerHTML = htmlText;
    }

    function renderHistoryEmpty(message) {
      const root = document.getElementById("history-section");
      root.innerHTML = `<div class="history-empty">${safe(message)}</div>`;
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }

    function renderHistoryReportCard(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" 쨌 ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <h3 class="history-report-title">${safe(item.title)}</h3>
            <div class="report-brief">${meta}</div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStock(stockCode) {
      renderHistoryForStockCompact(stockCode);
    }

    function renderHistoryReportCardCompact(item) {
      const meta = [
        safe(item.source),
        safe(item.author),
        [safe(item.investment_opinion), safe(item.target_price)].filter(Boolean).join(" "),
        upsideLabel(item),
      ].filter(Boolean).join(" / ");
      return `
        <article class="history-report-card">
          <div class="history-report-main">
            <div class="history-title-row">
              <h3 class="history-report-title">${safe(item.title)}</h3>
              ${item.published_at ? `<span class="badge">${safe(item.published_at)}</span>` : ""}
            </div>
            <div class="report-brief">${meta}</div>
            <p class="summary">${safe(item.summary)}</p>
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문</a>
            </div>
          </div>
          <div class="history-report-badges">
            ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            <span class="badge">#${safe(item.report_idx)}</span>
          </div>
        </article>
      `;
    }

    function renderHistoryForStockCompact(stockCode) {
      const entries = allCachedReports()
        .filter((item) => item.stock_code === stockCode)
        .sort((a, b) => {
          const dateDiff = (b.published_at || "").localeCompare(a.published_at || "");
          if (dateDiff !== 0) return dateDiff;
          return String(b.report_idx || "").localeCompare(String(a.report_idx || ""));
        });
      const root = document.getElementById("history-section");
      if (!entries.length) {
        renderHistoryEmpty("?대떦 醫낅ぉ????λ맂 ?대젰???놁뒿?덈떎.");
        return;
      }

      const companyName = entries.find((item) => item.company_name)?.company_name || stockCode;
      const uniqueDates = new Set(entries.map((item) => item.published_at).filter(Boolean));
      const bestEntry = entries.find((item) => item.alpha_score !== null && item.alpha_score !== undefined);
      const cards = entries.map((item) => renderHistoryReportCardCompact(item)).join("");

      root.innerHTML = `
        <article class="group-card history-group-card">
          <div class="group-head">
            <div>
              <div class="group-title-row">
                <h2 class="group-title">${safe(companyName)}</h2>
              </div>
            </div>
          </div>
          <div class="group-meta">
            <span class="pill"><button type="button" data-copy-stock="${safe(stockCode)}">종목코드 복사</button></span>
            <span class="pill"><a href="${stockWebUrl(stockCode)}" target="_blank" rel="noreferrer">네이버금융</a></span>
          </div>
          <div class="report-stack">${cards}</div>
        </article>
      `;
    }

    async function runStockSearch() {
      const input = document.getElementById("stock-search");
      const query = String(input.value || "").trim();
      if (!query) {
        renderSearchResults("");
        renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
        return;
      }

      renderSearchResults('<span class="badge">아카이브 확인 중...</span>');
      const loaded = await ensureHistoryLoaded();
      if (!loaded) {
        renderSearchResults("");
        renderHistoryEmpty("아카이브를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      const matches = matchingStocks(query).slice(0, 12);
      if (!matches.length) {
        renderSearchResults("");
        renderHistoryEmpty(`"${query}"와 일치하는 종목 이력이 없습니다.`);
        return;
      }

      renderSearchResults(
        matches
          .map(
            (item) => `
              <button type="button" data-stock-history="${safe(item.stock_code)}">
                ${safe(item.company_name)} (${safe(item.stock_code)}) · ${item.report_count}건
              </button>
            `
          )
          .join("")
      );
      renderHistoryForStockCompact(matches[0].stock_code);
    }

    function renderFactorSections(item) {
      if (item.category !== "기업") return "";
      const sections = [];
      if (item.revision_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Revision Signal</div><p class="factor-text">${safe(item.revision_signal)}</p></div>`);
      }
      if (item.structural_growth_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Structural Growth</div><p class="factor-text">${safe(item.structural_growth_signal)}</p></div>`);
      }
      if (item.valuation_risk_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Valuation / Risk</div><p class="factor-text">${safe(item.valuation_risk_signal)}</p></div>`);
      }
      const positiveText = (item.positive_factors || []).map((value) => `+ ${safe(value)}`).join("<br>");
      const negativeText = (item.negative_factors || []).map((value) => `- ${safe(value)}`).join("<br>");
      if (positiveText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Positive Factors</div><p class="factor-text">${positiveText}</p></div>`);
      }
      if (negativeText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Negative Factors</div><p class="factor-text">${negativeText}</p></div>`);
      }
      if (item.market_reaction_placeholder) {
        sections.push(`<div class="factor-box"><div class="factor-title">Market Reaction</div><p class="factor-text">D+1 / D+5 / D+20 추후 연결 예정</p></div>`);
      }
      return sections.length ? `<div class="factor-grid">${sections.join("")}</div>` : "";
    }

    function renderGrouped(items) {
      const root = document.getElementById("list");
      const { groupedCompanies, industry, market } = groupedData(items);

      const groupCards = groupedCompanies.map((group) => {
        const reportsHtml = group.reports.map((report) => {
          const pointItems = (report.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
          return `
            <details class="report-detail">
              <summary>
                <div>
                  <div>${safe(report.title)}</div>
                  <div class="report-brief">${[
                    safe(report.source),
                    safe(report.author),
                    [safe(report.investment_opinion), safe(report.target_price)].filter(Boolean).join(" "),
                    upsideLabel(report),
                  ].filter(Boolean).join(" · ")}</div>
                </div>
                <div>
                  ${report.alpha_score !== null && report.alpha_score !== undefined ? `<div class="badge">${safe(report.alpha_grade || "-")} ${safe(report.alpha_score)}</div>` : ""}
                  <div class="badge">#${safe(report.report_idx)}</div>
                </div>
              </summary>
              <div class="report-body">
                <p class="summary">${safe(report.summary)}</p>
                ${pointItems ? `<ul class="points">${pointItems}</ul>` : ""}
                ${renderFactorSections(report)}
                <div class="links">
                  <a href="${safe(report.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
                </div>
              </div>
            </details>
          `;
        }).join("");

        return `
          <article class="group-card">
            <div class="group-head">
              <div>
                <div class="group-title-row">
                  <h2 class="group-title">${safe(group.company_name)}</h2>
                  ${renderPriceBox(group)}
                </div>
              </div>
            </div>
            <div class="group-meta">
              ${group.stock_code ? `<span class="pill"><button type="button" data-copy-stock="${safe(group.stock_code)}">종목코드 복사</button></span>` : ""}
              ${group.stock_code ? `<span class="pill"><a href="${stockWebUrl(group.stock_code)}" target="_blank" rel="noreferrer">네이버금융</a></span>` : ""}
            </div>
            <div class="report-stack">${reportsHtml}</div>
          </article>
        `;
      }).join("");

      const renderStandaloneSection = (title, entries) => entries.length
        ? `
          <div class="section-title">${title}</div>
          ${entries.map((item) => `
            <article class="card">
              <div class="row">
                <span class="badge">${safe(item.category)}</span>
                <span class="badge">${safe(item.published_at)}</span>
                <span class="badge">#${safe(item.report_idx)}</span>
              </div>
              <h2 class="title">${safe(item.title)}</h2>
              <div class="meta">작성자 ${safe(item.author)} · 출처 ${safe(item.source)}${item.market_topic ? ` · 주제 ${safe(item.market_topic)}` : ""}${item.industry_name ? ` · 산업 ${safe(item.industry_name)}` : ""}</div>
              <p class="summary">${safe(item.summary)}</p>
              ${renderFactorSections(item)}
              <div class="links">
                <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
              </div>
            </article>
          `).join("")}
        `
        : "";

      root.innerHTML = groupCards
        + renderStandaloneSection("산업 리포트", industry)
        + renderStandaloneSection("시장 리포트", market);
    }

    function renderList(items) {
      const root = document.getElementById("list");
      root.innerHTML = items.map((item) => {
        const meta = [
          item.author ? `작성자 ${item.author}` : "",
          item.source ? `출처 ${item.source}` : "",
          item.company_name ? `회사 ${item.company_name}` : "",
          item.stock_code ? `코드 ${item.stock_code}` : "",
          item.industry_name ? `산업 ${item.industry_name}` : "",
          item.market_topic ? `주제 ${item.market_topic}` : "",
          item.investment_opinion ? `의견 ${item.investment_opinion}` : "",
          item.target_price ? `목표가 ${item.target_price}` : "",
          upsideLabel(item),
          item.alpha_score !== null && item.alpha_score !== undefined ? `Alpha ${item.alpha_grade || "-"} ${item.alpha_score}` : "",
          item.live_price ? `현재가 ${item.live_price}원` : "",
        ].filter(Boolean).join(" · ");
        const points = (item.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
        return `
          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.category)}</span>
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            ${renderAlphaBox(item)}
            <p class="summary">${safe(item.summary)}</p>
            ${points ? `<ul class="points">${points}</ul>` : ""}
            ${renderFactorSections(item)}
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      renderModes();
      renderDateOptions();
      renderFilters();
      const items = filteredReports();
      renderStats(items);
      if (currentMode === "grouped") {
        renderGrouped(items);
      } else {
        renderList(items);
      }
    }

    async function switchDate(nextDate) {
      if (!nextDate || nextDate === currentDate) return;
      const nextReports = await fetchReportsForDate(nextDate);
      if (nextReports === null) {
        alert(`브리프를 불러오지 못했습니다: ${nextDate}`);
        renderDateOptions();
        return;
      }
      currentDate = nextDate;
      reports = nextReports;
      render();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-copy-stock]");
      if (!trigger) return;
      event.preventDefault();
      await copyStockCode(trigger.getAttribute("data-copy-stock"));
    });

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-stock-history]");
      if (!trigger) return;
      event.preventDefault();
      renderHistoryForStockCompact(trigger.getAttribute("data-stock-history"));
    });

    document.getElementById("search-button").addEventListener("click", () => {
      runStockSearch();
    });

    document.getElementById("stock-search").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      runStockSearch();
    });

    render();
    renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
  </script>
</body>
</html>
