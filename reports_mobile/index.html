벌 신흥국 중 SK 등이 EPS 상승을 주도하고, 한화에어로스페이스 등은 하락세", "선진국 시장은 글렌코어, 리오틴토 등 자원 관련주가 EPS 성장 상위, 사프란, 도요타 등은 하락세", "한국 MSCI 12MF EPS 성장률 92.1%, PER 7.4배, KOSPI 달러 환산 3개월 수익률 +25.7%", "신흥국과 선진국 각각 EPS 상·하위종목 상세 제시", "한국 내 2분기 및 연간 예상 영업이익 상·하단 돌파 종목과 최대 실적 종목 목록 제공", "진짜 모멘텀 보유 및 미래 성장률 상위 한국 종목 식별", "시장 주제는 글로벌 및 한국 이익 전망 변화와 투자 심리 반영, KOSPI 12개월 선행 PER의 의미 부각"], "risks": ["글로벌 및 신흥국 선진국별 이익 변동성", "일부 종목의 이익 하향 조정 및 전방위 수요 둔화 우려", "산업별로 이익 모멘텀의 이질적 분포"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/시장/649749.pdf", "json_path": "../reports_json/시장/649749.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649749"}, {"report_idx": "649743", "category": "시장", "published_at": "2026-05-28", "title": "전략공감2.0", "author": "리서치센터", "source": "메리츠증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "Mega IPO 주식물량 공급충격 및 글로벌 EV 시장 성장과 중국산 EV의 글로벌 점유율 확대", "investment_opinion": null, "target_price": null, "summary": "본 시장 리포트는 최근 미국의 대규모 Mega IPO가 주식시장에 미칠 공급압력 및 글로벌 EV 시장 성장 현황을 분석하였다. Mega IPO 규모는 과거 대비 크지만, 실제 신규 주식 공급 부담은 비교적 낮으며, 증시에 부정적 영향이 발생하기 위해서는 이익 모멘텀 약화 및 멀티플 조정 등 추가 요인이 필요하다. 고유가 지속 상황에서 EV 수요가 증가하는 가운데, 유럽 EV 시장은 성장 중이나 중국 배터리 기업의 점유율 급증으로 국내 업체의 경쟁력에 도전 요인이 되고 있다. 한편, 동남아·남미 등 신흥국에서는 가격 민감도가 높은 시장 특성상 중국산 저가 EV가 빠르게 시장을 장악하며 글로벌 EV 시장에서 중국산 EV의 영향력이 확장되고 있음을 확인하였다. 종합하면, Mega IPO로 인한 공급 충격은 제한적이며, EV 시장은 지역별 성장세 및 경쟁 구도가 다르게 전개되고 있어 투자자는 이러한 구조적 변화와 지정학적 리스크를 팔로우할 필요가 있다.", "key_points": ["미국의 Mega IPO 규모가 과거 IPO 호황기 대비 크지만, 실제 공모금액 기준 주식시장 공급부담은 낮은 편임", "IPO로 인한 주식 수 증가가 증시에 본질적인 하락 매도 영향으로 약세, 제약/바이오 업종은 FDA 임상 시험 소식에 강세 유지", "인도네시아 증시는 MSCI/FTSE 편입 종목 조정, 전략 자원 수출 통제 정책, 중앙은행 금리 인상 등으로 시장 불확실성 확대 및 외국인 자금 이탈 심화", "인도네시아 정부의 전략 자원 수출 통제 정책에 따른 수출 물량 및 가격 결정권 단일화로 자원민족주의 강화와 수출 경쟁력 약화 우려", "미국, 아세안 등 글로벌 주요 산업별 하반기 전망에서는 반도체 소재, 조선, 유틸리티, 자동차, 2차전지, 방위산업, 신성장산업, 지주사, 금융, 통신, 미디어 등에서 각각의 성장이 예상됨"], "risks": ["코스피 내 대형 종목 쏠림에 따른 시장 변동성 확대 위험", "코스닥 지속적인 외국인·기관 순매도에 따른 약세 지속 가능성", "인도네시아의 정책 불확실성과 전략 자원 수출 통제에 따른 외국인 자금 이탈 및 증시 하락 위험", "미국 및 글로벌 경기와 무역 관세 등 대내외 요인에 따른 산업별 실적 및 밸류에이션 변동성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/시장/649733.pdf", "json_path": "../reports_json/시장/649733.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649733"}, {"report_idx": "649722", "category": "시장", "published_at": "2026-05-28", "title": "Global Carbon Daily", "author": "최관순", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": null, "market_topic": "글로벌 탄소배출권 및 에너지 시장 동향", "investment_opinion": null, "target_price": null, "summary": "글로벌 탄소배출권 시장은 주요 지역에서 전반적인 가격 상승세를 보이고 있으며, 에너지 가격 역시 장기적으로 상승 흐름을 유지 중이다. 다만 최근 국제 유가의 급락은 지정학적 상황과 협상 기대감에 따른 변동성을 유발하고 있다. 유럽연합과 한국의 환경 정책 강화는 탄소배출권 수요 증가에 기여할 것으로 예상된다. ETF 및 ETN 시장은 안정적인 회복세를 나타내고 있어, 전반적인 시장 수급은 견조한 편이다. 그러나 에너지 시장 변동성과 정책 불확실성이 단기 리스크로 작용할 수 있다.", "key_points": ["글로벌 주요 배출권 가격은 대체로 상승세를 보이며, 특히 북미 RGGI 배출권은 3개월간 101.6% 상승.", "원유 및 에너지 가격은 최근 단기 하락세를 보이나, 3개월 기준으로는 상당한 상승세를 유지 중.", "탄소배출권 관련 ETF/ETN은 전반적으로 소폭 상승하며 양호한 수급 상황을 시사.", "국제 유가 급락은 이란 핵협상 타결 기대감에 의한 영향으로 원자재 시장의 변동성이 확대됨.", "유럽연합(EU)의 산업 열 배출 감축 지원과 한국의 열에너지 무탄소 전 "published_at": "2026-05-28", "title": "할인율이 사라진다", "author": "최관순", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "지주회사", "market_topic": "NAV 할인율 축소 및 자본시장 체질개선에 따른 지주회사 밸류업 전망", "investment_opinion": null, "target_price": null, "summary": "지주회사는 전통적 방어주 인식에도 불구하고 최근 NAV 할인율 축소와 베타 상승으로 코스피 상승기에 시장 대비 양호한 주가 성과를 기록하고 있다. 2024~2026년 상법 개정 및 금융위원회의 자본시장 체질개선 정책 시행을 통해 중복상장 금지 및 기업가치 훼손 방지 등 주주보호 강화가 예정되어 있어 할인율 추가 축소가 기대된다. 이에 따라 지주회사 밸류업 및 리레이팅이 가능할 전망이며, SK증권 커버리지 지주회사 9개사의 합산 할인율은 약 53.5%로 나타나고 있다. 다만 정책 실행 지연과 시장 변동성은 리스크로 작용할 수 있다.", "key_points": ["지주회사의 NAV 대비 할인율이 20년대 초 60%대에서 24~26년 밸류업, 상법개정 등에 힘입어 50% 초반까지 축소됨", "코스피 상승기 지주회사 주가는 전통적 방어주 인식과 달리 베타 상승과 할인율 축소로 인해 시장 대비 양호한 수익률 보임", "2026년부터 시행될 상법개정안(독립이사제, 감사위원 선임 3%룰 강화, 집중투표제 의무화 등)을 통해 주주보호 강화 및 할인율 추가 축소 기대", "자본시장 체질개선 정책(중복상장 금지, 기업가치 훼손 방지, 스튜어드십 코드 강화 등)은 지주회사 할인율 축소 및 리레이팅에 긍정적 요인", "SK증권 커버리지 9개 지주회사 합산 할인율은 약 53.5%이며, 자사주 소각 및 자본시장 개선 기대감으로 추가 할인율 축소 가능성 존재"], "risks": ["상법 개정 및 자본시장 정책 시행 일정 지연 가능성", "지주회사 자회사 실적 부진 시 밸류에이션 하락 위험", "시장 변동성 심화 시 지주회사 주가 약세 가능성"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/산업/649745.pdf", "json_path": "../reports_json/산업/649745.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649745"}, {"report_idx": "649740", "category": "산업", "published_at": "2026-05-28", "title": "P/E의 시대: 재평가의 본격화", "author": "한동희", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "반도체(메모리)", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": ": ["미국은 우주 우위전략을 국가안보 핵심 축으로 규정하고 민간 기업의 우주 자원 추출 권리를 법적으로 보장함", "달 남극 선점 경쟁은 지정학적 대결로 심화되며, NASA는 2027년 우주 탐사 예산안을 핵추진 및 핵전력 시스템 개발 중심으로 재편", "달 표면 무인 건설, 태양전지 제조 기술, 방사선 동위원소 전력 시스템 개발 등 인프라 구축 추진", "우주 태양광은 24시간 구동 가능한 발전원으로, 고효율 태양전지 기술(HJT, 페로브스카이트 탠덤셀 등)이 진화 중이며 국내 폴리실리콘, 은구리 페이스트 업체에 성장 기회 제공", "달 원전(FSP) 개발은 2030년까지 100 kWe급 핵분열 원자로 설치를 목표로 하며, 국내외 기자재 및 특수 소재 시장 확대 예상", "우주 원전은 핵융합 전력 수요 증가, 핵 추진 우주선 개발, 군사 기술 스필오버 등으로 잠재 시장 규모가 큼", "한국은 발사체, 페이로드, 통신 등 우주 인프라 분야 경쟁력을 보유해 NASA의 정책 전환에 따른 수혜 가능성 존재"], "risks": ["우주 산업 및 신기술 개발 지연 가능성", "글로벌 지정학적 긴장 및 정책 변화에 따른 불확실성", "원자재 및 특수 소재 공급망 리스크"], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/산업/649738.pdf", "json_path": "../reports_json/산업/649738.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649738"}, {"report_idx": "649737", "category": "산업", "published_at": "2026-05-28", "title": "인바운드는 최고치 경신, 아웃바운드는 상저하고", "author": "나승두", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "여행/호텔/레저", "market_topic": null, "investment_opinion": null, "target_price": null, "summary": "2026년 상반기 한국의 여행/호텔/레저 산업은 인바운드 관광객 수가 사상 최고치를 경신하며 강세를 보이나, 아웃바운드 관광 수요는 지정학적 불안과 유가 상승에 따른 소비 심리 위축으로 성장 둔화됨. 호텔 산업은 객실 예약률 포화 상태에 진입해 객실 단가만 상승하고 있으며, 카지노 산업은 외국인 관광객의 여행 성향 변화에 따라 지역별로 상이한 실적 흐름을 보임. 하반기에는 중동 전쟁 영향과 유가 변동에 따른 관광 심리 변화가 주요 관전 포인트다.", "key_points": ["2026년 상반기 한국 인바운드 관광객 수가 누적 701만 명으로 전년 대비 20.8% 증가하며 사상 최고치를 경신함.", "중국, 대만, 홍콩 등 중화권과 일본에서의 입국 증가가 두드러짐.", "주요 도시의 호텔 객실 예약률이 80% 중후반대로 만실 수준 유지.", "아웃바운드 관광객은 전년 대비 6.7% 증가에 그쳤으며, 중동 전쟁과 유가 상승, 유류할증료 최고단계 진입으로 소비 심리 위축됨.", "카지노 산업에서는 도심형 외국인 전용 카지노 실적 회복이 제한적이며, K문화 체험 및 가성비 소비 증가로 관광 성향 변화 확인.", "제주도는 외국인 입도객 증가와 카지노 매출 증가가 연동되는 차별적 흐름 보임.", "하반기 전망으로는 중동 전쟁 영향으로 장거리 여행은 감소하나, 단거리 동아시아 여행 수요는 증가 예상.", "호텔 산업은 객실 공급 부족으로 객실 예약률은 한계에 도달, 객실 단가 상승 국면 진입.", "가격 상승은 수익성 개선에 기여할 수 있으나 무리한 인상은 소비자 저항 유발 가능성.", "유가 하락 시 유류할증료 인하가 아웃바운드 관광 심리 개선의 관건이 될 전망."], "risks": ["중동 전쟁 및 지정학적 불안이 장거리 여행 수요 위축 유발.", "유가 상승 및 유류할증료 최고 단계로 인한 여행 소비 심리 위축.", "카지노 산업은 외국인 관광객 성향 변화로 실적 회복 제한적.", "호텔 객실 공급 부족에 따라 예약률 포화 및 가격 인상에 따른 소비자 저항 가능성."], "alpha_score": null, "alpha_grade": null, "score_reason": null, "positive_factors": [], "negative_factors": [], "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/산업/649737.pdf", "json_path": "../reports_json/산업/649737.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649737"}, {"report_idx": "649735", "category": "산업", "published_at": "2026-05-28", "title": "거제 야호", "author": "이지니", "source": "대신증권", "company_name": null, "stock_code": null, "industry_name": "조선업", "market_topic": "한국형 핵추진 잠수함 사업 추진과 관련 핵심 이슈", "investment_opinion": null, "target_price": null, "summary": "한국형 핵추진 잠수함 사업은 국가 안보 및 자주국방 역량 강화를 위한 전략적 프로젝트로, 프랑스 바라쿠다급을 벤치마크하여 5~6천톤급, 4~6척 규모로 추진 중이다. 저농축 우라늄 연료 사용으로 핵보유국 중 독특한 운영 체계를 갖고 있으며, 2030년 후반까지 선도함 진수를 목표로 하나 기술적 난제와 일정 지연 위험이 존재한다. 조선산업 측면에서는 고부가가치 방산 사업 진출과 MRO 매출 확대 효과가 기대되며, 한화오션과 HD현대중공업이 주요 수혜주로 거론된다.", "key_points": ["한국 정부가 저농축 우라늄 기반의 핵추진 잠수함(K-SSN) 국내 개발 및 건조 사업을 추진 중임", "한국 핵잠수함 벤치마크는 프랑스 바라쿠다급이 유력하며, 수중배수량 5~6천톤급, 4~6척 규모 예상", "한국 핵잠수함 보유 목적은 자주국방 역량 강화, 지정학적 특수성 대응, 외교 협상력 강화 등 전략적 수단 확보", "사업 추진 일정은 2030년 후반 선도함 진수 목표이나 국내 핵연료봉 설계 난이도로 개발기간 연장 가능성 존재", "저농축 우라늄  "revision_signal": null, "structural_growth_signal": null, "valuation_risk_signal": null, "market_reaction_placeholder": {"status": "pending", "d1_return_pct": null, "d5_return_pct": null, "d20_return_pct": null}, "live_price": null, "live_price_change": null, "live_price_rate": null, "live_price_direction": null, "live_price_as_of": null, "pdf_path": "../reports_pdf/산업/649729.pdf", "json_path": "../reports_json/산업/649729.json", "pdf_url": "https://consensus.hankyung.com/analysis/downpdf?report_idx=649729"}, {"report_idx": "649728", "category": "산업", "published_at": "2026-05-28", "title": "업황의 핵심 변수는 가동률", "author": "박형우, 정영환", "source": "SK증권", "company_name": null, "stock_code": null, "industry_name": "배터리", "market_topic": "가동률이 배터리 업황의 핵심 변수", "investment_opinion": null, "target_price": null, "summary": "2026년 배터리 산업은 ESS 수요 확대와 흑자전환 기대에 힘입어 긍정적 모멘텀을 보였으나, 북미 EV 시장의 미진한 회복, 원자재 가격 상승에 따른 마진 압박, 미국 EV 보조금 정책 변화, 중국과의 기술 및 점유율 격차 등이 부담으로 작용하고 있다. 하반기에도 가동률이 업황의 핵심 변수이며, 국내 셀 3사의 생산능력은 일부 축소되지만 ESS 수요 증가로 출하량은 소폭 확대가 예상된다. 공급과잉 완화에도 불구하고 대부분 업체의 가동률은 낮은 수준에 머무를 전망이다. 소재 및 장비사, 특히 알루미늄박과 동박 부문이 유망하며, 국산화 실패 시 LFP 배터리 사업과 ESS 수익성이 악화될 위험이 존재한다. 중국의 신기술 개발 경쟁이 심화되는 가운데, 국내 기업들은 기술격차 해소와 수익성 개선에 집중할 필요가 있다.", "key_points": ["2026년 상반기 배터리 업종은 ESS 성장 모멘텀과 흑자전환 기대에 힘입어 반등했지만, 5월부터 반락했다.", "중동 지정학 리스크로 인한 유가 상승이 전기차 수요 회복 기대감으로 연결되었으나 북미 EV 구매는 미진하다.", "리튬·메탈 가격 상승에도 불구하고 셀메이커의 판가 인상이 어려워 밸류체인 전반에서 마진 압박이 지속된다.", "미국 EV 구매보조금 폐지, 중국과의 기술 격차, 그리고 한국 셀 3사의 글로벌 점유율 하락이 부담 요인이다.", "2026년 하반기에도 배터리 산업의 가동률이 핵심 변수이며, 국내 셀 3사 캐파는 18GWh 축소, 출하량은 ESS 효과로 10GWh 증가가 예상된다.", "대다수 업체들의 하반기 가동률은 40~70% 후반대에 머무르고, 가동률 반등 폭이 큰 업체들이 유망하다.", "ESS 배터리 수요는 2024년부터 2026년까지 연평균 약 27% 성장 전망, 2026~2030년에도 고성장 지속 예상.", "EV 배터리 수요는 2026년 기준 약 400GWh 하향 조정되어 ESS 성장만으로 EV 부진을 상쇄하기 어려움.", "LFP 전환 시 인산철 전구체 조달 병목 및 중국 원료 의존도가 문제이며, 국산화 없이는 수익성 확보가 어렵다.", "ESS 수익성도 명확하지 않고 셀 3사 간 가격 경쟁과 ESS 고객사의 AMPC 쉐어링 요구가 수익성 리스크로 작용한다.", "중국 CATL은 소듐배터리 양산과 차량 탑재를 추진하며 기술격차가 점유율을 넘어 심화되고 있다.", "국내 배터리 기업들은 설비 확장을       root.innerHTML = `<div class="history-empty">${safe(message)}</div>`;
    }

    function matchingStocks(query) {
      const keyword = String(query || "").trim().toLowerCase();
      if (!keyword) return [];
      return stockCatalog()
        .map((item) => {
          const name = String(item.company_name || "").toLowerCase();
          const code = String(item.stock_code || "").toLowerCase();
          let score = -1;
          if (code === keyword) score = 100;
          else if (name === keyword) score = 95;
          else if (code.startsWith(keyword)) score = 80;
          else if (name.startsWith(keyword)) score = 70;
          else if (code.includes(keyword)) score = 60;
          else if (name.includes(keyword)) score = 50;
          return { ...item, score };
        })
        .filter((item) => item.score >= 0)
        .sort((a, b) => {
          const scoreDiff = b.score - a.score;
          if (scoreDiff !== 0) return scoreDiff;
          const dateDiff = (b.latest_date || "").localeCompare(a.latest_date || "");
          if (dateDiff !== 0) return dateDiff;
          return (a.company_name || "").localeCompare(b.company_name || "", "ko");
        });
    }

    function renderHistoryForStock(stockCode) {
      const entries = allCachedReports()
        .filter((item) => item.category === "기업" && item.stock_code === stockCode)
        .sort((a, b) => {
          const dateDiff = (b.published_at || "").localeCompare(a.published_at || "");
          if (dateDiff !== 0) return dateDiff;
          return String(b.report_idx || "").localeCompare(String(a.report_idx || ""));
        });
      const root = document.getElementById("history-section");
      if (!entries.length) {
        renderHistoryEmpty("해당 종목의 저장된 이력이 없습니다.");
        return;
      }

      const companyName = entries.find((item) => item.company_name)?.company_name || stockCode;
      const uniqueDates = new Set(entries.map((item) => item.published_at).filter(Boolean));
      const historyCards = entries.map((item) => {
        const upside = upsideLabel(item);
        const meta = [
          item.published_at || "",
          item.source ? `출처 ${item.source}` : "",
          item.author ? `작성자 ${item.author}` : "",
          item.investment_opinion ? `의견 ${item.investment_opinion}` : "",
          item.target_price ? `목표가 ${item.target_price}` : "",
          upside || "",
        ].filter(Boolean).join(" · ");
        return `
          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
              ${item.alpha_score !== null && item.alpha_score !== undefined ? `<span class="badge">${safe(item.alpha_grade || "-")} ${safe(item.alpha_score)}</span>` : ""}
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            <p class="summary">${safe(item.summary)}</p>
            <div class="links">
              <button type="button" data-copy-stock="${safe(item.stock_code)}">종목코드 복사</button>
              <a href="${stockWebUrl(item.stock_code)}" target="_blank" rel="noreferrer">네이버금융</a>
              <a href="${safe(item.pdf_path)}" target="_blank" rel="noreferrer">PDF</a>
              <a href="${safe(item.json_path)}" target="_blank" rel="noreferrer">JSON</a>
            </div>
          </article>
        `;
      }).join("");

      root.innerHTML = `
        <article class="card">
          <div class="row">
            <span class="badge">종목 이력</span>
            <span class="badge">${safe(stockCode)}</span>
          </div>
          <h2 class="title">${safe(companyName)}</h2>
          <p class="history-summary">저장된 리포트 ${entries.length}건 / 확인된 날짜 ${uniqueDates.size}일</p>
        </article>
        ${historyCards}
      `;
    }

    async function runStockSearch() {
      const input = document.getElementById("stock-search");
      const query = String(input.value || "").trim();
      if (!query) {
        renderSearchResults("");
        renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
        return;
      }

      renderSearchResults('<span class="badge">아카이브 확인 중...</span>');
      const loaded = await ensureHistoryLoaded();
      if (!loaded) {
        renderSearchResults("");
        renderHistoryEmpty("아카이브를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      const matches = matchingStocks(query).slice(0, 12);
      if (!matches.length) {
        renderSearchResults("");
        renderHistoryEmpty(`"${query}"와 일치하는 종목 이력이 없습니다.`);
        return;
      }

      renderSearchResults(
        matches
          .map(
            (item) => `
              <button type="button" data-stock-history="${safe(item.stock_code)}">
                ${safe(item.company_name)} (${safe(item.stock_code)}) · ${item.report_count}건
              </button>
            `
          )
          .join("")
      );
      renderHistoryForStock(matches[0].stock_code);
    }

    function renderFactorSections(item) {
      if (item.category !== "기업") return "";
      const sections = [];
      if (item.revision_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Revision Signal</div><p class="factor-text">${safe(item.revision_signal)}</p></div>`);
      }
      if (item.structural_growth_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Structural Growth</div><p class="factor-text">${safe(item.structural_growth_signal)}</p></div>`);
      }
      if (item.valuation_risk_signal) {
        sections.push(`<div class="factor-box"><div class="factor-title">Valuation / Risk</div><p class="factor-text">${safe(item.valuation_risk_signal)}</p></div>`);
      }
      const positiveText = (item.positive_factors || []).map((value) => `+ ${safe(value)}`).join("<br>");
      const negativeText = (item.negative_factors || []).map((value) => `- ${safe(value)}`).join("<br>");
      if (positiveText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Positive Factors</div><p class="factor-text">${positiveText}</p></div>`);
      }
      if (negativeText) {
        sections.push(`<div class="factor-box"><div class="factor-title">Negative Factors</div><p class="factor-text">${negativeText}</p></div>`);
      }
      if (item.market_reaction_placeholder) {
        sections.push(`<div class="factor-box"><div class="factor-title">Market Reaction</div><p class="factor-text">D+1 / D+5 / D+20 추후 연결 예정</p></div>`);
      }
      return sections.length ? `<div class="factor-grid">${sections.join("")}</div>` : "";
    }

    function renderGrouped(items) {
      const root = document.getElementById("list");
      const { groupedCompanies, industry, market } = groupedData(items);

      const groupCards = groupedCompanies.map((group) => {
        const reportsHtml = group.reports.map((report) => {
          const pointItems = (report.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
          return `
            <details class="report-detail">
              <summary>
                <div>
                  <div>${safe(report.title)}</div>
                  <div class="report-brief">${[
                    safe(report.source),
                    safe(report.author),
                    [safe(report.investment_opinion), safe(report.target_price)].filter(Boolean).join(" "),
                    upsideLabel(report),
                  ].filter(Boolean).join(" · ")}</div>
                </div>
                <div>
                  ${report.alpha_score !== null && report.alpha_score !== undefined ? `<div class="badge">${safe(report.alpha_grade || "-")} ${safe(report.alpha_score)}</div>` : ""}
                  <div class="badge">#${safe(report.report_idx)}</div>
                </div>
              </summary>
              <div class="report-body">
                <p class="summary">${safe(report.summary)}</p>
                ${pointItems ? `<ul class="points">${pointItems}</ul>` : ""}
                ${renderFactorSections(report)}
                <div class="links">
                  <a href="${safe(report.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
                </div>
              </div>
            </details>
          `;
        }).join("");

        return `
          <article class="group-card">
            <div class="group-head">
              <div>
                <h2 class="group-title">${safe(group.company_name)}</h2>
                <div class="group-sub">종목코드 ${safe(group.stock_code)} · 리포트 ${group.reports.length}건 · 최고점 ${safe(group.best_alpha_grade || "-")} ${safe(group.best_alpha_score ?? "")}</div>
              </div>
              ${renderPriceBox(group)}
            </div>
            <div class="group-meta">
              ${group.stock_code ? `<span class="pill"><button type="button" data-copy-stock="${safe(group.stock_code)}">종목코드 복사</button></span>` : ""}
              ${group.stock_code ? `<span class="pill"><a href="${stockWebUrl(group.stock_code)}" target="_blank" rel="noreferrer">네이버금융</a></span>` : ""}
            </div>
            <div class="report-stack">${reportsHtml}</div>
          </article>
        `;
      }).join("");

      const renderStandaloneSection = (title, entries) => entries.length
        ? `
          <div class="section-title">${title}</div>
          ${entries.map((item) => `
            <article class="card">
              <div class="row">
                <span class="badge">${safe(item.category)}</span>
                <span class="badge">${safe(item.published_at)}</span>
                <span class="badge">#${safe(item.report_idx)}</span>
              </div>
              <h2 class="title">${safe(item.title)}</h2>
              <div class="meta">작성자 ${safe(item.author)} · 출처 ${safe(item.source)}${item.market_topic ? ` · 주제 ${safe(item.market_topic)}` : ""}${item.industry_name ? ` · 산업 ${safe(item.industry_name)}` : ""}</div>
              <p class="summary">${safe(item.summary)}</p>
              ${renderFactorSections(item)}
              <div class="links">
                <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
              </div>
            </article>
          `).join("")}
        `
        : "";

      root.innerHTML = groupCards
        + renderStandaloneSection("산업 리포트", industry)
        + renderStandaloneSection("시장 리포트", market);
    }

    function renderList(items) {
      const root = document.getElementById("list");
      root.innerHTML = items.map((item) => {
        const meta = [
          item.author ? `작성자 ${item.author}` : "",
          item.source ? `출처 ${item.source}` : "",
          item.company_name ? `회사 ${item.company_name}` : "",
          item.stock_code ? `코드 ${item.stock_code}` : "",
          item.industry_name ? `산업 ${item.industry_name}` : "",
          item.market_topic ? `주제 ${item.market_topic}` : "",
          item.investment_opinion ? `의견 ${item.investment_opinion}` : "",
          item.target_price ? `목표가 ${item.target_price}` : "",
          upsideLabel(item),
          item.alpha_score !== null && item.alpha_score !== undefined ? `Alpha ${item.alpha_grade || "-"} ${item.alpha_score}` : "",
          item.live_price ? `현재가 ${item.live_price}원` : "",
        ].filter(Boolean).join(" · ");
        const points = (item.key_points || []).slice(0, 4).map((point) => `<li>${safe(point)}</li>`).join("");
        return `
          <article class="card">
            <div class="row">
              <span class="badge">${safe(item.category)}</span>
              <span class="badge">${safe(item.published_at)}</span>
              <span class="badge">#${safe(item.report_idx)}</span>
            </div>
            <h2 class="title">${safe(item.title)}</h2>
            <div class="meta">${meta}</div>
            ${renderAlphaBox(item)}
            <p class="summary">${safe(item.summary)}</p>
            ${points ? `<ul class="points">${points}</ul>` : ""}
            ${renderFactorSections(item)}
            <div class="links">
              <a href="${safe(item.pdf_url)}" target="_blank" rel="noreferrer">원문 링크</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      renderModes();
      renderDateOptions();
      renderFilters();
      const items = filteredReports();
      renderStats(items);
      if (currentMode === "grouped") {
        renderGrouped(items);
      } else {
        renderList(items);
      }
    }

    async function switchDate(nextDate) {
      if (!nextDate || nextDate === currentDate) return;
      const nextReports = await fetchReportsForDate(nextDate);
      if (nextReports === null) {
        alert(`브리프를 불러오지 못했습니다: ${nextDate}`);
        renderDateOptions();
        return;
      }
      currentDate = nextDate;
      reports = nextReports;
      render();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-copy-stock]");
      if (!trigger) return;
      event.preventDefault();
      await copyStockCode(trigger.getAttribute("data-copy-stock"));
    });

    document.addEventListener("click", (event) => {
      const trigger = event.target.closest("[data-stock-history]");
      if (!trigger) return;
      event.preventDefault();
      renderHistoryForStock(trigger.getAttribute("data-stock-history"));
    });

    document.getElementById("search-button").addEventListener("click", () => {
      runStockSearch();
    });

    document.getElementById("stock-search").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      runStockSearch();
    });

    render();
    renderHistoryEmpty("종목명 또는 6자리 종목코드로 검색하면 저장된 분석 이력을 볼 수 있습니다.");
  </script>
</body>
</html>
